<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="משמרות">
  <title>משמרות</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg:      #000;
      --s1:      #1c1c1e;
      --s2:      #2c2c2e;
      --s3:      #3a3a3c;
      --text:    #fff;
      --muted:   #8e8e93;
      --accent:  #7c3aed;
      --green:   #30d158;
      --morning: #ff9f0a;
      --mbg:     rgba(255,159,10,.18);
      --evening: #bf5af2;
      --ebg:     rgba(191,90,242,.18);
      --warn:    #ff453a;
      --wbg:     rgba(255,69,58,.16);
      --wborder: rgba(255,69,58,.38);
      --safe-t:  env(safe-area-inset-top, 0px);
      --safe-b:  env(safe-area-inset-bottom, 0px);
      --HH: 52px;
      --WH: 50px;
      --TH: 56px;
      --EC: 88px;
      --DC: 84px;
    }
    *, *::before, *::after {
      box-sizing:border-box; margin:0; padding:0;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none;
    }
    html, body { height:100%; overflow:hidden; overscroll-behavior:none; }
    body {
      font-family:'Heebo',-apple-system,sans-serif;
      background:var(--bg); color:var(--text);
      direction:rtl; -webkit-text-size-adjust:100%;
    }

    /* ─── STATUS BAR ─── */
    .status-bar {
      height:var(--safe-t);
      background:rgba(28,28,30,.95);
      position:fixed; top:0; left:0; right:0; z-index:50;
    }

    /* ─── HEADER ─── */
    .header {
      position:fixed;
      top:var(--safe-t); left:0; right:0; height:var(--HH);
      background:rgba(28,28,30,.92);
      backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
      border-bottom:.5px solid var(--s3);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 16px; z-index:40;
    }
    .header-title { font-size:17px; font-weight:800; letter-spacing:-.2px; }
    .hbtn {
      display:flex; align-items:center; gap:5px;
      background:var(--s2); border:none; color:var(--text);
      padding:7px 13px; border-radius:100px;
      font-family:'Heebo',sans-serif; font-size:13px; font-weight:600; cursor:pointer;
    }
    .hbtn:active { opacity:.55; }

    /* ─── WEEK BAR ─── */
    .week-bar {
      position:fixed;
      top:calc(var(--safe-t) + var(--HH)); left:0; right:0; height:var(--WH);
      background:var(--s1); border-bottom:.5px solid var(--s3);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 12px; z-index:39; transition:opacity .18s;
    }
    .week-bar.hidden { opacity:0; pointer-events:none; }
    .week-label { font-size:14px; font-weight:700; }
    .week-btns  { display:flex; align-items:center; gap:8px; }
    .today-pill {
      background:rgba(124,58,237,.15); color:var(--accent);
      border:none; padding:5px 12px; border-radius:100px;
      font-family:'Heebo',sans-serif; font-size:12px; font-weight:700; cursor:pointer;
    }
    .today-pill:active { opacity:.55; }
    .wbtn {
      width:34px; height:34px; background:var(--s2);
      border:none; color:var(--text); border-radius:50%;
      font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer;
    }
    .wbtn:active { opacity:.5; transform:scale(.88); }

    /* ─── CONTENT ─── */
    .content {
      position:fixed;
      top:calc(var(--safe-t) + var(--HH) + var(--WH));
      bottom:calc(var(--safe-b) + var(--TH));
      left:0; right:0; overflow:hidden;
    }
    .content.no-week { top:calc(var(--safe-t) + var(--HH)); }

    /* ─── VIEWS ─── */
    .view { position:absolute; inset:0; display:none; overflow:hidden; }
    .view.active { display:block; }

    /* ══════════════════════════════
       TAB: GRID
    ══════════════════════════════ */
    #vGrid { overflow:auto; -webkit-overflow-scrolling:touch; }
    .gtable { border-collapse:collapse; width:max-content; }
    .gtable thead th {
      background:var(--s1); padding:8px 4px;
      text-align:center; font-size:11px; font-weight:700; color:var(--muted);
      border-bottom:.5px solid var(--s3);
      position:sticky; top:0; z-index:4; min-width:var(--DC);
    }
    .gtable thead th:first-child {
      position:sticky; left:0; z-index:5;
      background:#111; text-align:right; padding-right:10px;
      direction:rtl; min-width:var(--EC); border-left:.5px solid var(--s3);
    }
    .dnum { display:block; font-size:20px; font-weight:900; color:var(--text); line-height:1; margin-top:2px; }
    .th-today .dnum { color:var(--green); }
    .gtable tbody tr:last-child td { border-bottom:none; }
    .gtable tbody td { border-bottom:.5px solid var(--s3); }
    .gtable tbody td:first-child {
      position:sticky; left:0; z-index:2;
      background:var(--s1); border-left:.5px solid var(--s3);
      padding:0 10px; direction:rtl; min-width:var(--EC);
    }
    .erow-inner { display:flex; align-items:center; gap:6px; height:84px; }
    .edot  { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .ename { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60px; }
    .scell { min-width:var(--DC); height:84px; padding:0; }
    .halves { display:flex; flex-direction:column; height:84px; }
    .half {
      flex:1; display:flex; align-items:center; justify-content:center; gap:3px;
      cursor:pointer; font-size:10px; font-weight:800;
      user-select:none; -webkit-user-select:none;
      direction:rtl; transition:filter .1s; letter-spacing:.2px;
    }
    .half.top { border-bottom:.5px solid var(--s3); }
    .half:active { filter:brightness(.6); }
    .half.top.on  { background:var(--mbg); color:var(--morning); }
    .half.top:not(.on) { color:var(--s3); }
    .half.bot.on  { background:var(--ebg); color:var(--evening); }
    .half.bot:not(.on) { color:var(--s3); }
    .td-today { background:rgba(48,209,88,.03); }
    .sum-row td {
      background:rgba(20,20,20,.96); text-align:center;
      padding:8px 4px; border-top:1px solid var(--s3);
      font-size:10px; direction:rtl; position:sticky; bottom:0;
    }
    .sum-row td:first-child {
      position:sticky; left:0; text-align:right; padding-right:10px;
      font-weight:700; color:var(--muted); background:#0a0a0a; z-index:2;
    }
    .sn { font-size:17px; font-weight:900; display:block; }
    .sm { color:var(--morning); font-size:9px; font-weight:800; }
    .se { color:var(--evening); font-size:9px; font-weight:800; }

    /* ══════════════════════════════
       TAB: EMPLOYEES
    ══════════════════════════════ */
    #vEmps { overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .sec-label {
      font-size:11px; font-weight:800; text-transform:uppercase;
      letter-spacing:1.5px; color:var(--muted); padding:18px 16px 7px;
    }
    .emp-cards { background:var(--s1); border-radius:14px; margin:0 14px; overflow:hidden; }
    .emp-card {
      display:flex; align-items:center; gap:12px;
      padding:14px 16px; border-bottom:.5px solid var(--s3); min-height:58px;
    }
    .emp-card:last-child { border-bottom:none; }
    .ecd { width:13px; height:13px; border-radius:50%; flex-shrink:0; }
    .ecn { font-size:16px; font-weight:500; flex:1; }
    .ecs { font-size:12px; color:var(--muted); margin-top:2px; }
    .del-btn {
      background:rgba(255,69,58,.14); border:none; color:#ff453a;
      width:32px; height:32px; border-radius:50%; font-size:15px;
      display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
    }
    .del-btn:active { opacity:.5; transform:scale(.85); }
    .add-card { margin:14px; background:var(--s1); border-radius:14px; overflow:hidden; }
    .add-row  { display:flex; align-items:center; gap:10px; padding:12px 16px; }
    .add-input {
      flex:1; background:none; border:none; color:var(--text);
      font-family:'Heebo',sans-serif; font-size:16px; outline:none; direction:rtl; min-width:0;
    }
    .add-input::placeholder { color:var(--muted); }
    .add-btn {
      background:var(--accent); border:none; color:#fff;
      width:36px; height:36px; border-radius:50%; font-size:24px; line-height:1;
      display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
    }
    .add-btn:active { opacity:.65; transform:scale(.88); }
    .tip-text { font-size:12px; color:var(--muted); padding:10px 18px 20px; line-height:1.5; }

    /* ══════════════════════════════
       TAB: SUMMARY (day cards)
    ══════════════════════════════ */
    #vSum { overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .stats-row {
      display:flex; gap:9px; padding:14px 14px 4px;
      overflow-x:auto; -webkit-overflow-scrolling:touch;
    }
    .stats-row::-webkit-scrollbar { display:none; }
    .stat-card {
      background:var(--s1); border-radius:14px;
      padding:12px 16px; flex-shrink:0; min-width:105px; text-align:center;
    }
    .stat-n { font-size:28px; font-weight:900; line-height:1; display:block; }
    .stat-n.warn { color:var(--warn); }
    .stat-n.ok   { color:var(--green); }
    .stat-n.info { color:var(--morning); }
    .stat-n.dim  { color:var(--muted); }
    .stat-lbl { font-size:11px; color:var(--muted); margin-top:4px; font-weight:600; }
    .day-cards { display:flex; flex-direction:column; gap:10px; padding:10px 14px 24px; }
    .day-card {
      background:var(--s1); border-radius:16px; overflow:hidden;
      border:1px solid var(--s3); transition:border-color .15s;
    }
    .day-card.has-dup { border-color:var(--wborder); }
    .day-hdr {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px 10px; border-bottom:.5px solid var(--s3);
    }
    .day-name-row { display:flex; align-items:baseline; gap:8px; }
    .day-name { font-size:16px; font-weight:800; }
    .day-date { font-size:12px; color:var(--muted); }
    .dbadge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:100px; }
    .dbadge-dup   { background:var(--wbg); color:var(--warn); }
    .dbadge-today { background:rgba(48,209,88,.15); color:var(--green); }
    .dbadge-ok    { background:rgba(255,255,255,.07); color:var(--muted); }
    .shift-rows { display:flex; flex-direction:column; }
    .shift-row {
      display:flex; align-items:flex-start; gap:10px;
      padding:11px 16px; border-bottom:.5px solid var(--s3); min-height:50px;
    }
    .shift-row:last-child { border-bottom:none; }
    .sh-label { display:flex; align-items:center; gap:4px; font-size:12px; font-weight:800; width:68px; flex-shrink:0; margin-top:3px; }
    .sh-label.m { color:var(--morning); }
    .sh-label.e { color:var(--evening); }
    .sh-chips { flex:1; display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .chip { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:100px; font-size:13px; font-weight:600; background:var(--s2); }
    .chip.dup { background:var(--wbg); outline:1px solid var(--wborder); }
    .chip-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .sh-empty { font-size:13px; color:var(--s3); margin-top:3px; }
    .dup-banner {
      display:flex; align-items:center; gap:7px;
      background:var(--wbg); border-top:.5px solid var(--wborder);
      padding:9px 16px; font-size:12px; font-weight:700; color:var(--warn);
    }

    /* ══════════════════════════════
       TAB: OVERVIEW TABLE  ← NEW
    ══════════════════════════════ */
    #vOvr { overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:20px; }

    /* Legend bar */
    .ov-legend {
      display:flex; gap:10px; align-items:center;
      padding:14px 14px 8px; flex-wrap:wrap;
    }
    .ov-legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
    .ov-dot {
      width:10px; height:10px; border-radius:3px; flex-shrink:0;
    }
    .ov-dot.ok  { background:#1a3a27; outline:1px solid #30d158; }
    .ov-dot.dup { background:#3a1a1a; outline:1px solid var(--warn); }
    .ov-dot.emp { background:var(--s2); outline:1px solid var(--s3); }

    /* The table */
    .ov-wrap {
      margin:0 12px;
      background:var(--s1);
      border-radius:16px;
      overflow:hidden;
      border:1px solid var(--s3);
    }

    .ov-table {
      width:100%;
      border-collapse:collapse;
      direction:rtl;
    }

    /* Header */
    .ov-table thead th {
      background:#111;
      padding:11px 12px;
      font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--muted);
      border-bottom:1px solid var(--s3);
    }
    .ov-table thead th:first-child { width:76px; }
    .ov-table thead th:not(:first-child) { border-right:.5px solid var(--s3); }

    /* Body rows */
    .ov-table tbody tr { border-bottom:.5px solid var(--s3); }
    .ov-table tbody tr:last-child { border-bottom:none; }

    /* Day label cell */
    .ov-day {
      padding:0 12px;
      vertical-align:middle;
    }
    .ov-day-inner {
      display:flex; flex-direction:column; justify-content:center;
      height:68px;
    }
    .ov-dayname { font-size:14px; font-weight:800; }
    .ov-daydate { font-size:11px; color:var(--muted); margin-top:1px; }
    .ov-day.is-today .ov-dayname { color:var(--green); }

    /* Shift status cell */
    .ov-cell {
      padding:6px 8px;
      border-right:.5px solid var(--s3);
      vertical-align:top;
      height:68px;
    }
    .ov-cell:first-child { border-right:none; }

    /* Status block inside cell */
    .ov-block {
      height:100%;
      border-radius:10px;
      padding:8px 10px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:5px;
      min-height:52px;
    }

    /* Color states */
    .ov-block.st-ok {
      background:rgba(48,209,88,.12);
      border:1px solid rgba(48,209,88,.25);
    }
    .ov-block.st-dup {
      background:var(--wbg);
      border:1px solid var(--wborder);
    }
    .ov-block.st-empty {
      background:var(--s2);
      border:1px solid var(--s3);
    }

    /* Status header line */
    .ov-status {
      display:flex; align-items:center; gap:5px;
      font-size:11px; font-weight:800;
    }
    .ov-status.ok    { color:var(--green); }
    .ov-status.dup   { color:var(--warn); }
    .ov-status.empty { color:var(--muted); }

    /* Employee names in overview */
    .ov-names {
      display:flex; flex-wrap:wrap; gap:4px;
    }
    .ov-name {
      display:flex; align-items:center; gap:4px;
      font-size:11px; font-weight:600; color:var(--text);
      background:rgba(255,255,255,.07);
      padding:2px 7px; border-radius:100px;
      white-space:nowrap;
    }
    .ov-name.dup-name {
      background:rgba(255,69,58,.18);
      color:#ff9389;
    }
    .ov-ndot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

    /* Empty state */
    .empty {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100%; text-align:center; padding:30px; direction:rtl;
    }
    .empty .ico { font-size:56px; margin-bottom:16px; }
    .empty h3   { font-size:20px; font-weight:800; margin-bottom:8px; }
    .empty p    { font-size:14px; color:var(--muted); line-height:1.5; }

    /* ─── TAB BAR ─── */
    .tab-bar {
      position:fixed; bottom:0; left:0; right:0;
      height:calc(var(--TH) + var(--safe-b));
      background:rgba(18,18,18,.95);
      backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
      border-top:.5px solid var(--s3);
      display:flex; padding-bottom:var(--safe-b); z-index:40;
    }
    .tab {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:3px;
      cursor:pointer; border:none; background:none;
      color:var(--muted); font-family:'Heebo',sans-serif;
      padding-top:6px; transition:color .15s; position:relative;
    }
    .tab:active { opacity:.5; }
    .tab.active { color:var(--accent); }
    .tab-icon  { font-size:20px; line-height:1; }
    .tab-label { font-size:10px; font-weight:600; }
    .rdot {
      position:absolute; top:5px; right:calc(50% - 16px);
      width:9px; height:9px; background:var(--warn);
      border-radius:50%; border:2px solid #000; display:none;
    }
    .rdot.on { display:block; }

    /* ─── TOAST ─── */
    .toast {
      position:fixed;
      bottom:calc(var(--safe-b) + var(--TH) + 12px);
      left:50%; transform:translateX(-50%) translateY(70px);
      background:rgba(30,30,30,.92); border:.5px solid var(--s3); color:#fff;
      padding:10px 20px; border-radius:100px;
      font-size:13px; font-weight:700;
      transition:transform .32s cubic-bezier(.34,1.56,.64,1);
      z-index:999; pointer-events:none;
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      white-space:nowrap;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="status-bar"></div>

<header class="header">
  <div class="header-title" id="hTitle">📅 משמרות</div>
  <button class="hbtn" id="hExport" onclick="doExport()">📊 Excel</button>
</header>

<div class="week-bar" id="weekBar">
  <div class="week-label" id="weekLabel">—</div>
  <div class="week-btns">
    <button class="today-pill" onclick="goToday()">היום</button>
    <button class="wbtn" onclick="shiftWeek(-1)">‹</button>
    <button class="wbtn" onclick="shiftWeek(1)">›</button>
  </div>
</div>

<div class="content" id="content">

  <!-- TAB: לוח -->
  <div class="view active" id="vGrid"></div>

  <!-- TAB: עובדים -->
  <div class="view" id="vEmps">
    <div class="sec-label">רשימת עובדים</div>
    <div class="emp-cards" id="empCards"></div>
    <div class="add-card">
      <div class="add-row">
        <input class="add-input" id="addInput" type="text"
               placeholder="שם עובד חדש..." maxlength="18"
               onkeydown="if(event.key==='Enter') addEmp()">
        <button class="add-btn" onclick="addEmp()">+</button>
      </div>
    </div>
    <div class="tip-text">☀ בוקר (תא עליון) · 🌙 ערב (תא תחתון)<br>לחץ על תא בלוח כדי להוסיף/לבטל משמרת</div>
  </div>

  <!-- TAB: סיכום (day cards) -->
  <div class="view" id="vSum">
    <div class="stats-row" id="statsRow"></div>
    <div class="day-cards" id="dayCds"></div>
  </div>

  <!-- TAB: טבלה (overview) -->
  <div class="view" id="vOvr">
    <!-- legend + table rendered by JS -->
  </div>

</div>

<!-- TAB BAR — 4 tabs -->
<nav class="tab-bar">
  <button class="tab active" id="tab-grid" onclick="switchTab('grid')">
    <span class="tab-icon">📅</span>
    <span class="tab-label">לוח</span>
  </button>
  <button class="tab" id="tab-emps" onclick="switchTab('emps')">
    <span class="tab-icon">👥</span>
    <span class="tab-label">עובדים</span>
  </button>
  <button class="tab" id="tab-sum" onclick="switchTab('sum')">
    <span class="tab-icon">📋</span>
    <span class="tab-label">סיכום</span>
    <span class="rdot" id="dupDot"></span>
  </button>
  <button class="tab" id="tab-ovr" onclick="switchTab('ovr')">
    <span class="tab-icon">🗂</span>
    <span class="tab-label">טבלה</span>
    <span class="rdot" id="dupDot2"></span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════
const COLORS = ['#818cf8','#fb923c','#34d399','#f87171','#a78bfa',
                '#38bdf8','#fbbf24','#f472b6','#4ade80','#60a5fa','#e879f9','#2dd4bf'];
const DAYS_S  = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
const DAYS_F  = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const MONTHS  = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני',
                 'יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

// ══════════════════════════════════
//  STATE
// ══════════════════════════════════
let employees = [];
let schedule  = {};
let weekOff   = 0;
let curTab    = 'grid';

function save() {
  localStorage.setItem('sm_employees', JSON.stringify(employees));
  localStorage.setItem('sm_schedule',  JSON.stringify(schedule));
}
function load() {
  try {
    employees = JSON.parse(localStorage.getItem('sm_employees') || '[]');
    schedule  = JSON.parse(localStorage.getItem('sm_schedule')  || '{}');
  } catch(e) { employees=[]; schedule={}; }
}

// ══════════════════════════════════
//  DATE UTILS
// ══════════════════════════════════
function getWeek(off=0) {
  const t=new Date(), s=new Date(t);
  s.setHours(0,0,0,0);
  s.setDate(t.getDate()-t.getDay()+off*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d;});
}
function dk(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isToday(d) {
  const t=new Date();
  return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear();
}
function wkLabel(days) {
  const [f,l]=[days[0],days[6]];
  return f.getMonth()===l.getMonth()
    ?`${f.getDate()}–${l.getDate()} ${MONTHS[l.getMonth()]}`
    :`${f.getDate()} ${MONTHS[f.getMonth()].slice(0,3)} – ${l.getDate()} ${MONTHS[l.getMonth()].slice(0,3)}`;
}
function getS(id,dt,t) { return !!(schedule[dt]?.[id]?.[t]); }
function empById(id)    { return employees.find(e=>e.id===id); }

// ══════════════════════════════════
//  EMPLOYEES
// ══════════════════════════════════
function addEmp() {
  const inp=document.getElementById('addInput');
  const name=inp.value.trim();
  if(!name) return;
  if(employees.find(e=>e.name===name)){toast('⚠ שם זה כבר קיים');return;}
  employees.push({id:'e'+Date.now(), name, color:COLORS[employees.length%COLORS.length]});
  inp.value=''; save(); renderAll(); toast(`✓ ${name} נוסף`);
}
function removeEmp(id) {
  const emp=employees.find(e=>e.id===id);
  if(!emp||!confirm(`למחוק את ${emp.name}?`)) return;
  employees=employees.filter(e=>e.id!==id);
  Object.keys(schedule).forEach(dt=>{delete schedule[dt][id];});
  save(); renderAll(); toast(`מחוק: ${emp.name}`);
}
function empWeekCount(id) {
  return getWeek(weekOff).reduce((c,d)=>{
    const k=dk(d); return c+(getS(id,k,'m')?1:0)+(getS(id,k,'e')?1:0);
  },0);
}

// ══════════════════════════════════
//  TOGGLE SHIFT
// ══════════════════════════════════
function toggle(empId,dateStr,type) {
  if(!schedule[dateStr]) schedule[dateStr]={};
  if(!schedule[dateStr][empId]) schedule[dateStr][empId]={m:false,e:false};
  schedule[dateStr][empId][type]=!schedule[dateStr][empId][type];
  if(!schedule[dateStr][empId].m&&!schedule[dateStr][empId].e) delete schedule[dateStr][empId];
  if(!Object.keys(schedule[dateStr]||{}).length) delete schedule[dateStr];
  save();
  renderGrid(); updateDupDots();
  if(curTab==='emps') renderEmps();
  if(curTab==='sum')  renderSum();
  if(curTab==='ovr')  renderOvr();
}

// ══════════════════════════════════
//  ANALYZE
// ══════════════════════════════════
function analyze(days) {
  return days.map(d=>{
    const key=dk(d), day=schedule[key]||{};
    const morning=[], evening=[];
    Object.entries(day).forEach(([id,s])=>{
      const emp=empById(id); if(!emp) return;
      if(s.m) morning.push(emp);
      if(s.e) evening.push(emp);
    });
    const mDup=morning.length>1, eDup=evening.length>1;
    return {date:d, key, morning, evening, mDup, eDup, hasDup:mDup||eDup};
  });
}
function countDups() { return analyze(getWeek(weekOff)).filter(d=>d.hasDup).length; }
function updateDupDots() {
  const on=countDups()>0;
  document.getElementById('dupDot').classList.toggle('on',on);
  document.getElementById('dupDot2').classList.toggle('on',on);
}

// ══════════════════════════════════
//  RENDER ALL
// ══════════════════════════════════
function renderAll() {
  renderGrid();
  if(curTab==='emps') renderEmps();
  if(curTab==='sum')  renderSum();
  if(curTab==='ovr')  renderOvr();
  updateDupDots();
}

// ══════════════════════════════════
//  RENDER: GRID
// ══════════════════════════════════
function renderGrid() {
  const days=getWeek(weekOff);
  document.getElementById('weekLabel').textContent=wkLabel(days);
  const el=document.getElementById('vGrid');
  if(!employees.length) {
    el.innerHTML=`<div class="empty">
      <div class="ico">👥</div><h3>אין עובדים עדיין</h3>
      <p>עבור לטאב <strong>עובדים</strong><br>כדי להוסיף את הצוות</p>
    </div>`; return;
  }
  const thCells=days.map((d,i)=>`
    <th class="${isToday(d)?'th-today':''}">
      ${DAYS_S[i]}<br><span class="dnum">${d.getDate()}</span>
    </th>`).join('');
  const rows=employees.map(emp=>{
    const cells=days.map(d=>{
      const key=dk(d),tc=isToday(d)?'td-today':'';
      const mon=getS(emp.id,key,'m')?'on':'', eve=getS(emp.id,key,'e')?'on':'';
      return `<td class="scell ${tc}"><div class="halves">
        <div class="half top ${mon}" onclick="toggle('${emp.id}','${key}','m')">☀<span>בוקר</span></div>
        <div class="half bot ${eve}" onclick="toggle('${emp.id}','${key}','e')">🌙<span>ערב</span></div>
      </div></td>`;
    }).join('');
    return `<tr><td><div class="erow-inner">
      <div class="edot" style="background:${emp.color}"></div>
      <div class="ename">${emp.name}</div>
    </div></td>${cells}</tr>`;
  }).join('');
  const sumCells=days.map(d=>{
    const day=schedule[dk(d)]||{};
    let m=0,e=0; Object.values(day).forEach(s=>{if(s.m)m++;if(s.e)e++;});
    const tot=m+e;
    return `<td>
      ${tot>0?`<span class="sn">${tot}</span>`:'<span style="color:var(--s3)">–</span>'}
      ${m>0?`<div class="sm">☀${m}</div>`:''}${e>0?`<div class="se">🌙${e}</div>`:''}
    </td>`;
  }).join('');
  el.innerHTML=`<table class="gtable">
    <thead><tr>
      <th style="text-align:right;padding-right:10px;direction:rtl;font-size:10px;">עובד</th>
      ${thCells}</tr></thead>
    <tbody>${rows}
      <tr class="sum-row"><td>סה"כ</td>${sumCells}</tr>
    </tbody></table>`;
}

// ══════════════════════════════════
//  RENDER: EMPLOYEES
// ══════════════════════════════════
function renderEmps() {
  const el=document.getElementById('empCards');
  if(!employees.length) {
    el.innerHTML=`<div class="emp-card" style="justify-content:center;color:var(--muted);font-size:14px;">
      הוסף עובד ראשון למטה</div>`; return;
  }
  el.innerHTML=employees.map(emp=>{
    const c=empWeekCount(emp.id);
    return `<div class="emp-card">
      <div class="ecd" style="background:${emp.color}"></div>
      <div style="flex:1">
        <div class="ecn">${emp.name}</div>
        <div class="ecs">${c>0?`${c} משמרות השבוע`:'אין משמרות השבוע'}</div>
      </div>
      <button class="del-btn" onclick="removeEmp('${emp.id}')">✕</button>
    </div>`;
  }).join('');
}

// ══════════════════════════════════
//  RENDER: SUMMARY (day cards)
// ══════════════════════════════════
function renderSum() {
  const days=getWeek(weekOff), an=analyze(days);
  const dups=an.filter(d=>d.hasDup).length;
  const slots=an.reduce((a,d)=>a+d.morning.length+d.evening.length,0);
  const covered=an.filter(d=>d.morning.length||d.evening.length).length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><span class="stat-n ${dups>0?'warn':'ok'}">${dups}</span><div class="stat-lbl">כפילויות</div></div>
    <div class="stat-card"><span class="stat-n info">${slots}</span><div class="stat-lbl">משמרות בשבוע</div></div>
    <div class="stat-card"><span class="stat-n ok">${covered}</span><div class="stat-lbl">ימים מכוסים</div></div>
    <div class="stat-card"><span class="stat-n dim">${7-covered}</span><div class="stat-lbl">ימים ריקים</div></div>`;
  if(!employees.length) {
    document.getElementById('dayCds').innerHTML=`<div class="empty" style="height:260px;">
      <div class="ico">📭</div><h3>אין נתונים</h3><p>הוסף עובדים ומשמרות</p>
    </div>`; return;
  }
  function chips(emps,isDup) {
    if(!emps.length) return `<span class="sh-empty">—</span>`;
    return emps.map(e=>`<div class="chip ${isDup?'dup':''}">
      <div class="chip-dot" style="background:${e.color}"></div>${e.name}
    </div>`).join('');
  }
  document.getElementById('dayCds').innerHTML=an.map(day=>{
    const d=day.date, dateStr=`${d.getDate()} ${MONTHS[d.getMonth()]}`;
    const today=isToday(d);
    let badge='';
    if(day.hasDup){const n=(day.mDup?1:0)+(day.eDup?1:0);badge=`<div class="dbadge dbadge-dup">⚠ ${n} כפילות${n>1?'ות':''}</div>`;}
    else if(today) badge=`<div class="dbadge dbadge-today">היום</div>`;
    else if(day.morning.length||day.evening.length) badge=`<div class="dbadge dbadge-ok">✓ מכוסה</div>`;
    else badge=`<div class="dbadge dbadge-ok">ריק</div>`;
    let dd=[]; if(day.mDup) dd.push(`☀ ${day.morning.map(e=>e.name).join(', ')}`);
                if(day.eDup) dd.push(`🌙 ${day.evening.map(e=>e.name).join(', ')}`);
    const banner=day.hasDup?`<div class="dup-banner">⚠ כפילות — ${dd.join(' · ')}</div>`:'';
    return `<div class="day-card ${day.hasDup?'has-dup':''}">
      <div class="day-hdr">
        <div class="day-name-row"><div class="day-name">${DAYS_F[d.getDay()]}</div><div class="day-date">${dateStr}</div></div>
        ${badge}
      </div>
      <div class="shift-rows">
        <div class="shift-row"><div class="sh-label m">☀ בוקר</div><div class="sh-chips">${chips(day.morning,day.mDup)}</div></div>
        <div class="shift-row"><div class="sh-label e">🌙 ערב</div><div class="sh-chips">${chips(day.evening,day.eDup)}</div></div>
      </div>${banner}
    </div>`;
  }).join('');
}

// ══════════════════════════════════
//  RENDER: OVERVIEW TABLE  ← NEW
// ══════════════════════════════════
function renderOvr() {
  const days=getWeek(weekOff), an=analyze(days);
  const el=document.getElementById('vOvr');

  if(!employees.length) {
    el.innerHTML=`<div class="empty">
      <div class="ico">🗂</div><h3>אין נתונים</h3>
      <p>הוסף עובדים ומשמרות בטאב הלוח</p>
    </div>`; return;
  }

  // Helper: build a status block for one shift slot
  function block(emps, isDup) {
    let stClass, statusIcon, statusText;
    if(emps.length===0) {
      stClass='st-empty';
      statusIcon='○';
      statusText='ריק';
    } else if(isDup) {
      stClass='st-dup';
      statusIcon='⚠';
      statusText=`כפילות (${emps.length})`;
    } else {
      stClass='st-ok';
      statusIcon='✓';
      statusText='מכוסה';
    }
    const statusCls = emps.length===0?'empty':isDup?'dup':'ok';
    const namesHtml = emps.map(e=>`
      <div class="ov-name ${isDup?'dup-name':''}">
        <div class="ov-ndot" style="background:${e.color}"></div>
        ${e.name}
      </div>`).join('');
    return `<div class="ov-block ${stClass}">
      <div class="ov-status ${statusCls}">${statusIcon} ${statusText}</div>
      ${emps.length>0 ? `<div class="ov-names">${namesHtml}</div>` : ''}
    </div>`;
  }

  const rows = an.map(day=>{
    const d=day.date;
    const todayCls = isToday(d) ? 'is-today' : '';
    return `<tr>
      <td class="ov-day ${todayCls}">
        <div class="ov-day-inner">
          <div class="ov-dayname">${DAYS_F[d.getDay()]}</div>
          <div class="ov-daydate">${d.getDate()}/${d.getMonth()+1}</div>
        </div>
      </td>
      <td class="ov-cell">${block(day.morning, day.mDup)}</td>
      <td class="ov-cell">${block(day.evening, day.eDup)}</td>
    </tr>`;
  }).join('');

  el.innerHTML=`
    <div class="ov-legend">
      <div class="ov-legend-item"><div class="ov-dot ok"></div> מכוסה (עובד אחד)</div>
      <div class="ov-legend-item"><div class="ov-dot dup"></div> כפילות (2+)</div>
      <div class="ov-legend-item"><div class="ov-dot emp"></div> ריק</div>
    </div>
    <div class="ov-wrap">
      <table class="ov-table">
        <thead>
          <tr>
            <th>יום</th>
            <th>☀ בוקר</th>
            <th>🌙 ערב</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ══════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════
function shiftWeek(d) {
  weekOff+=d; renderGrid(); updateDupDots();
  if(curTab==='emps') renderEmps();
  if(curTab==='sum')  renderSum();
  if(curTab==='ovr')  renderOvr();
}
function goToday() {
  weekOff=0; renderGrid(); updateDupDots();
  if(curTab==='emps') renderEmps();
  if(curTab==='sum')  renderSum();
  if(curTab==='ovr')  renderOvr();
}

// Swipe week bar
(()=>{
  let sx=0;
  const wb=document.getElementById('weekBar');
  wb.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
  wb.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>44) shiftWeek(dx>0?-1:1);
  },{passive:true});
})();

// ══════════════════════════════════
//  TAB SWITCHING
// ══════════════════════════════════
const TAB_CFG = {
  grid: {title:'📅 משמרות', weekBar:true,  export:true},
  emps: {title:'👥 עובדים', weekBar:false, export:false},
  sum:  {title:'📋 סיכום',  weekBar:true,  export:true},
  ovr:  {title:'🗂 טבלה',   weekBar:true,  export:true},
};

function switchTab(tab) {
  curTab=tab;
  const cfg=TAB_CFG[tab];
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('v'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('hTitle').textContent=cfg.title;
  const eb=document.getElementById('hExport');
  eb.style.display=cfg.export?'':'none';
  const wb=document.getElementById('weekBar'), ct=document.getElementById('content');
  if(cfg.weekBar){wb.classList.remove('hidden');ct.classList.remove('no-week');}
  else           {wb.classList.add('hidden');   ct.classList.add('no-week');}
  if(tab==='emps') renderEmps();
  if(tab==='sum')  renderSum();
  if(tab==='ovr')  renderOvr();
}

// ══════════════════════════════════
//  EXPORT
// ══════════════════════════════════
function doExport() {
  if(typeof XLSX==='undefined'){toast('⚠ XLSX לא נטען');return;}
  if(curTab==='sum'||curTab==='ovr') exportSum(); else exportGrid();
}
function exportGrid() {
  const days=getWeek(weekOff);
  const data=[['עובד',...days.map(d=>`${DAYS_F[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`)]];
  employees.forEach(emp=>{
    const row=[emp.name];
    days.forEach(d=>{const k=dk(d),m=getS(emp.id,k,'m'),e=getS(emp.id,k,'e');
      row.push(m&&e?'בוקר + ערב':m?'בוקר':e?'ערב':'');});
    data.push(row);
  });
  const tots=['סה"כ'];
  days.forEach(d=>{const day=schedule[dk(d)]||{};let c=0;
    Object.values(day).forEach(s=>{if(s.m)c++;if(s.e)c++;});tots.push(c||'');});
  data.push(tots);
  xlsxWrite(data,[{wch:13},...days.map(()=>({wch:16}))],'לוח משמרות','משמרות');
  toast('✓ לוח הורד');
}
function exportSum() {
  const days=getWeek(weekOff), an=analyze(days);
  const data=[['יום','תאריך','☀ בוקר','⚠ כפילות בוקר','🌙 ערב','⚠ כפילות ערב']];
  an.forEach(day=>{
    const d=day.date;
    data.push([DAYS_F[d.getDay()],`${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`,
      day.morning.map(e=>e.name).join(', ')||'—', day.mDup?`⚠ כפילות (${day.morning.length})`:'',
      day.evening.map(e=>e.name).join(', ')||'—', day.eDup?`⚠ כפילות (${day.evening.length})`:'']);
  });
  data.push([],['סה"כ כפילויות: '+an.filter(d=>d.hasDup).length]);
  xlsxWrite(data,[{wch:10},{wch:12},{wch:24},{wch:18},{wch:24},{wch:18}],'סיכום','סיכום');
  toast('✓ סיכום הורד');
}
function xlsxWrite(data,cols,sheet,prefix) {
  const ws=XLSX.utils.aoa_to_sheet(data); ws['!cols']=cols;
  const wb2=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb2,ws,sheet);
  const d0=getWeek(weekOff)[0];
  XLSX.writeFile(wb2,`${prefix}_${d0.getDate()}-${d0.getMonth()+1}.xlsx`);
}

// ══════════════════════════════════
//  TOAST
// ══════════════════════════════════
let _tt;
function toast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2400);
}

// ══════════════════════════════════
//  INIT
// ══════════════════════════════════
load(); renderAll();
</script>
</body>
</html>
