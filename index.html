document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-tap-highlight-color: transparent; }\n:root {\n  --bg: #F4F2EC;\n  --white: #ffffff;\n  --paper: #F0EEE6;\n  --black: #1B1A17;\n  --muted: #8C887E;\n  --faint: #B0AB9F;\n  --border: #E6E2D8;\n  --navy: #1F3A52;\n  --navy-deep: #16293A;\n  --amber: #E8A21C;\n  --green: #2E8B57;\n  --radius: 16px;\n}\nbody {\n  font-family: 'Heebo', sans-serif;\n  background: var(--bg);\n  color: var(--black);\n  min-height: 100vh;\n  min-height: 100dvh;\n}\n.app { max-width: 420px; margin: 0 auto; padding: 0; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }\n\n/* ── HEADER ── */\n.header {\npadding: 52px 0 18px;\ndisplay: flex;\njustify-content: space-between;\nalign-items: flex-start;\nborder-bottom: 1px solid var(--border);\nmargin-bottom: 20px;\n}\n.header-right h1 { font-size: 22px; font-weight: 900; color: var(--black); }\n.header-right p { font-size: 13px; color: var(--muted); margin-top: 3px; }\n.header-left { text-align: left; direction: ltr; }\n.clock { font-size: 20px; font-weight: 800; color: var(--black); font-variant-numeric: tabular-nums; }\n.clock-date { font-size: 11px; color: var(--muted); margin-top: 3px; }\n\n/* ── SCREENS ── */\n.screen { display: none; }\n.screen.active { display: flex; flex-direction: column; flex: 1; min-height: 0; }\n\n/* ── SETUP SCREEN ── */\n.date-hero { margin-bottom: 24px; }\n.date-hero-day { font-size: 28px; font-weight: 900; letter-spacing: -1px; line-height: 1; }\n.date-hero-date { font-size: 16px; color: var(--muted); margin-top: 6px; }\n\n.setup-label { font-size: 36px; letter-spacing: 3px; color: var(--black); text-transform: uppercase; margin-bottom: 10px; font-weight: 900; text-align: center; line-height: 1.15; }\n\n.add-row { display: flex; gap: 8px; margin-bottom: 12px; }\n.project-input {\nflex: 1;\nbackground: var(--white);\nborder: 1px solid var(--border);\nborder-radius: 12px;\npadding: 13px 14px;\ncolor: var(--black);\nfont-family: 'Heebo', sans-serif;\nfont-size: 16px;\noutline: none;\ndirection: rtl;\ntransition: border-color 0.2s;\n}\n.project-input:focus { border-color: var(--black); }\n.project-input::placeholder { color: #bbb; }\n.btn-add {\nwidth: 48px; height: 48px;\nbackground: var(--black); color: white;\nborder: none; border-radius: 12px;\nfont-size: 22px; font-weight: 900;\ncursor: pointer; flex-shrink: 0;\ntransition: transform 0.15s;\n}\n.btn-add:active { transform: scale(0.92); }\n\n.project-list-setup { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }\n.setup-project-item {\nbackground: var(--white);\nborder: 1px solid var(--border);\nborder-radius: 12px;\npadding: 12px 14px;\ndisplay: flex;\nalign-items: center;\njustify-content: space-between;\nanimation: fadeUp 0.2s ease;\n}\n@keyframes fadeUp { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }\n.setup-project-name { font-size: 15px; font-weight: 600; }\n.btn-remove { background: none; border: none; color: #bbb; font-size: 16px; cursor: pointer; padding: 4px 6px; }\n.btn-remove:active { color: var(--black); }\n\n.empty-msg {\ntext-align: center;\npadding: 20px;\ncolor: #bbb;\nfont-size: 13px;\nborder: 1px dashed var(--border);\nborder-radius: var(--radius);\nmargin-bottom: 24px;\n}\n\n.btn-start-day {\nwidth: 100%; padding: 32px 20px;\nbackground: var(--amber); color: var(--black);\nborder: none; border-radius: 16px;\nfont-family: 'Heebo', sans-serif;\nfont-size: 26px; font-weight: 900; letter-spacing: 0.3px;\ncursor: pointer; transition: transform 0.15s, opacity 0.2s;\nbox-shadow: 0 8px 22px rgba(232,162,28,0.42);\n}\n.btn-start-day:active { transform: scale(0.97); }\n.btn-start-day:disabled { opacity: 0.25; }\n\n\n\n/* ── DAY SCREEN ── */\n\n/* Day timer bar */\n.day-bar {\nbackground: var(--navy-deep);\nborder: none;\nborder-radius: 20px;\npadding: 20px 22px;\ndisplay: flex;\njustify-content: space-between;\nalign-items: center;\nmargin-bottom: 16px;\nbox-shadow: 0 10px 26px rgba(22,41,58,0.28);\n}\n.day-bar-label { font-size: c;\nopacity: 0.65;\ndisplay: none;\n}\n.project-note-saved.visible { display: block; }\n\n/* Notes list */\n.project-notes-list {\npadding: 4px 14px 6px;\ndisplay: flex;\nflex-direction: column;\ngap: 4px;\n}\n.project-note-item {\ndisplay: flex;\nalign-items: center;\njustify-content: space-between;\nfont-size: 12px;\nopacity: 0.75;\nfont-style: italic;\ngap: 6px;\n}\n.note-del-btn {\nbackground: none; border: none;\nfont-size: 11px; cursor: pointer;\nopacity: 0.4; color: inherit;\nflex-shrink: 0; padding: 2px 4px;\n}\n.note-del-btn:active { opacity: 1; }\n\n/* Custom client dropdown */\n.client-wrapper {\nposition: relative;\nmax-width: 140px;\nflex-shrink: 0;\n}\n.client-wrapper input {\nwidth: 100%;\npadding-left: 28px !important;\n}\n.client-arrow {\nposition: absolute;\nleft: 8px;\ntop: 50%;\ntransform: translateY(-50%);\nfont-size: 11px;\ncolor: #aaa;\ncursor: pointer;\npointer-events: none;\n}\n.client-dropdown {\ndisplay: none;\nposition: absolute;\ntop: calc(100% + 4px);\nright: 0;\nleft: 0;\nbackground: #fff;\nborder: 1px solid #111;\nborder-radius: 10px;\nz-index: 100;\nmax-height: 180px;\noverflow-y: auto;\nbox-shadow: 0 4px 16px rgba(0,0,0,0.12);\n}\n.client-dropdown.open { display: block; }\n.client-dropdown-item {\npadding: 11px 14px;\nfont-size: 14px;\nfont-family: 'Heebo', sans-serif;\ncursor: pointer;\ndirection: rtl;\nborder-bottom: 1px solid #f0f0f0;\n}\n.client-dropdown-item:last-child { border-bottom: none; }\n.client-dropdown-item:active { background: #f5f5f5; }\n\n/* Note input row */\n.project-note-row {\ndisplay: none;\npadding: 8px 12px;\ngap: 8px;\nalign-items: center;\nborder-top: 1px solid rgba(0,0,0,0.08);\n}\n.project-note-row.open { display: flex; }\n.project-note-input {\nflex: 1; border: none; background: transparent;\nfont-family: 'Heebo', sans-serif; font-size: 16px;\ncolor: inherit; outline: none; direction: rtl;\n}\n.project-note-input::placeholder { opacity: 0.35; }\n.note-ok-btn {\nbackground: rgba(0,0,0,0.12); border: none;  0 0;width:100%;max-height:80vh;display:flex;flex-direction:column;font-family:Heebo,sans-serif;\">\n    <div style=\"padding:16px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;\">\n      <div style=\"font-weight:700;font-size:17px;\">💰 Gross Profit — To Invoice<\u002Fdiv>\n      <button onclick=\"document.getElementById('gpOverlay').style.display='none'\" style=\"background:none;border:none;font-size:22px;cursor:pointer;color:#888;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"gpContent\" style=\"overflow-y:auto;flex:1;padding:16px 20px;\"><\u002Fdiv>\n    <div style=\"padding:14px 16px;border-top:1px solid #eee;flex-shrink:0;\">\n      <button id=\"gpCopyBtn\" onclick=\"copyGP()\" style=\"width:100%;padding:13px;background:#16293A;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;\">📋 Copy to clipboard<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Actual Price Overlay -->\n<div id=\"apOverlay\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10010;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:80vh;display:flex;flex-direction:column;font-family:Heebo,sans-serif;\">\n    <div style=\"padding:16px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;\">\n      <div style=\"font-weight:700;font-size:17px;\">🧾 Actual Price — To Invoice<\u002Fdiv>\n      <button onclick=\"document.getElementById('apOverlay').style.display='none'\" style=\"background:none;border:none;font-size:22px;cursor:pointer;color:#888;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"apContent\" style=\"overflow-y:auto;flex:1;padding:16px 20px;\"><\u002Fdiv>\n    <div style=\"padding:14px 16px;border-top:1px solid #eee;flex-shrink:0;\">\n      <button id=\"apCopyBtn\" onclick=\"copyAP()\" style=\"width:100%;padding:13px;background:#16293A;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;\">📋 Copy to clipboard<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Day Note Overlay -->\n<div id=\"dayNoteOverlay\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:10010;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;padding:24px 20px 36px;font-family:Heebo,sans-serif;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;\">\n      <div style=\"font-size:18px;font-weight:900;color:#16293A;\">📝 Day Note<\u002Fdiv>\n      <button onclick=\"closeDayNote()\" style=\"background:none;border:none;font-size:24px;cursor:pointer;color:#888;line-height:1;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"font-size:12px;color:#aaa;margin-bottom:10px;\" id=\"dayNoteTimestamp\"><\u002Fdiv>\n    <textarea id=\"dayNoteInput\" placeholder=\"כתוב הערה כללית ליום...\" style=\"width:100%;height:140px;border:1.5px solid #ddd;border-radius:12px;padding:12px 14px;font-size:16px;font-family:Heebo,sans-serif;resize:none;outline:none;line-height:1.5;\" dir=\"rtl\"><\u002Ftextarea>\n    <button onclick=\"submitDayNote()\" id=\"dayNoteSubmitBtn\" style=\"width:100%;margin-top:14px;padding:14px;background:#16293A;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;\">💾 שמור הערה<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Day Notes List Overlay -->\n<div id=\"dayNotesListOverlay\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10009;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:80vh;display:flex;flex-direction:column;font-family:Heebo,sans-serif;\">\n    <div style=\"padding:16px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;\">\n      <div style=\"font-weight:700;font-size:17px;\">📝 הערות יום<\u002Fdiv>\n      <button onclick=\"document.getElementById('dayNotesListOverlay').style.display='none'\" style=\"background:none;border:none;font-size:22px;cursor:pointer;color:#888;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"dayNotesList\" style=\"overflow-y:auto;flex:1;padding:12px 16px;\"><\u002Fdiv>\n    <div style=\"padding:14px 16px;border-top:1px solid #eee;flex-shrink:0;\">\n      <button onclick=\"openDayNote()\" style=\"width:100%;padding:13px;background:#16293A;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;\">+ הוסף הערה<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div id=\"poAttachOverlay\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10008;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;font-family:Heebo,sans-serif;\">\n    <div style=\"padding:16px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;\">\n      <div style=\"font-weight:700;font-size:17px;\">📌 Attach PO to Existing Project<\u002Fdiv>\n      <button onclick=\"document.getElementById('poAttachOverlay').style.display='none'\" style=\"background:none;border:none;font-size:22px;cursor:pointer;color:#888;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"poAttachList\" style=\"overflow-y:auto;flex:1;padding:0;\"><\u002Fdiv>\n    <div style=\"padding:14px 16px;border-top:1px solid #eee;flex-shrink:0;\">\n      <button id=\"poAttachConfirmBtn\" onclick=\"confirmPOAttach()\" style=\"width:100%;padding:13px;background:#6a1b9a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:none;\">✓ Confirm Attachments<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"poImportOverlay\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10006;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;font-family:Heebo,sans-serif;\">\n    <div style=\"padding:16px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;\">\n      <div style=\"font-weight:700;font-size:17px;\">📧 PO Import<\u002Fdiv>\n      <button onclick=\"document.getElementById('poImportOverlay').style.display='none'\" style=\"background:none;border:none;font-size:22px;cursor:pointer;color:#888;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"poImportList\" style=\"overflow-y:auto;flex:1;padding:0;\"><\u002Fdiv>\n    <div style=\"padding:14px 16px;border-top:1px solid #eee;flex-shrink:0;\">\n      <button id=\"poImportCopyBtn\" onclick=\"copyPOImportResults()\" style=\"width:100%;padding:13px;background:#E8A21C;color:#111;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:Heebo,sans-serif;cursor:pointer;display:none;\">📋 Copy to clipboard<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<!-- Caspit Overlay -->\n<div id=\"caspitOverlay\" onclick=\"if(event.target===this)this.style.display='none'\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:10014;align-items:flex-end;justify-content:center;\">\n\n  <!-- Log Panel -->\n  <div id=\"caspitLogPanel\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:10020;align-items:center;justify-content:center;padding:20px;\">\n    <div style=\"background:#0f1923;border-radius:14px;overflow:hidden;border:1px solid #2a3a4a;width:100%;max-width:480px;\">\n      <div style=\"background:#1F3A52;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;\">\n        <span style=\"color:#fff;font-size:14px;font-weight:700;\">📋 Caspit Test Result<\u002Fspan>\n        <div style=\"display:flex;gap:8px;align-items:center;\">\n          <span id=\"caspitLogStatus\" style=\"background:#1b5e20;color:#a5d6a7;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;\"><\u002Fspan>\n          <button onclick=\"document.getElementById('caspitLogPanel').style.display='none'\" style=\"background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"caspitLogSummary\" style=\"padding:14px 16px;border-bottom:1px solid #1a2a3a;\"><\u002Fdiv>\n      <button onclick=\"var b=document.getElementById('caspitLogJson');var open=b.style.display!=='none';b.style.display=open?'none':'block';this.textContent=open?'▶ Show full JSON':'▼ Hide full JSON';\" style=\"width:100%;padding:10px;background:none;border:none;color:#78909c;font-size:12px;cursor:pointer;font-family:Heebo,sans-serif;border-top:1px solid #1a2a3a;\">▶ Show full JSON<\u002Fbutton>\n      <div id=\"caspitLogJson\" style=\"display:none;background:#060e14;padding:14px;font-size:10px;color:#80cbc4;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:280px;overflow-y:auto;\"><\u002Fdiv>\n      <button onclick=\"var t=document.getElementById('caspitLogJson').textContent;navigator.clipboard.writeText(t).then(function(){var b=document.getElementById('caspitCopyBtn');b.textContent='✓ Copied!';b.style.background='#1b5e20';setTimeout(function(){b.textContent='📋 Copy Full Result';b.style.background='#1F3A52';},2000);});\" id=\"caspitCopyBtn\" style=\"width:calc(100% - 32px);margin:12px 16px;padding:12px;background:#1F3A52;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:Heebo,sans-serif;cursor:pointer;\">📋 Copy Full Result<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;display:flex;flex-direction:column;font-family:Heebo,sans-serif;\">\n    <div style=\"padding:16px 20px 0;border-bottom:1px solid #eee;flex-shrink:0;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;\">\n        <div style=\"font-weight:900;font-size:17px;color:#1F3A52;\">💼 Caspit <span style=\"font-size:11px;font-weight:400;color:#aaa;\">v300<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:8px;align-items:center;\">\n<button onclick=\"testCaspitProxy()\" style=\"background:#f5f5f5;border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-size:12px;cursor:pointer;color:#666;min-width:44px;min-height:44px;\">🔌<\u002Fbutton>\n          <button onclick=\"this.closest('#caspitOverlay').style.display='none';localStorage.removeItem('ybd_caspit_state');\" style=\"background:none;border:none;font-size:22px;cursor:pointer;color:#888;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"overflow-y:auto;flex:1;\">\n      <!-- New Client -->\n      <div style=\"padding:12px 16px;border-bottom:1px solid #f0f0f0;\">\n        <button onclick=\"openNewClientModal()\" style=\"width:100%;background:#e8f5e9;border:1.5px solid #a5d6a7;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;font-family:Heebo,sans-serif;-webkit-tap-highlight-color:transparent;\">\n          <span style=\"font-size:22px;flex-shrink:0;\">🏢<\u002Fspan>\n          <div style=\"text-align:right;\">\n            <div style=\"font-size:14px;font-weight:900;color:#2e7d32;\">Create New Client<\u002Fdiv>\n            <div style=\"font-size:11px;color:#4caf50;margin-top:1px;\">לקוח חדש<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <!-- Invoice / Receipt accordion -->\n      <div style=\"border-bottom:1px solid #f0f0f0;\">\n        <button id=\"acc-hdr-invoice\" onclick=\"toggleCaspitAccordion('invoice')\" style=\"width:100%;padding:14px 20px;background:none;border:none;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:Heebo,sans-serif;-webkit-tap-highlight-color:transparent;\">\n          <span style=\"font-size:14px;font-weight:900;color:inherit;\">📄 Invoice / Receipt<\u002Fspan>\n          <span id=\"acc-arrow-invoice\" style=\"font-size:13px;color:#aaa;\">▼<\u002Fspan>\n        <\u002Fbutton>\n        <div id=\"caspitBody-invoice\" style=\"display:none;padding:0 20px 16px;direction:rtl;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- New Quotation accordion -->\n      <div style=\"border-bottom:1px solid #f0f0f0;\">\n        <button id=\"acc-hdr-quote\" onclick=\"toggleCaspitAccordion('quote')\" style=\"width:100%;padding:14px 20px;background:none;border:none;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:Heebo,sans-serif;-webkit-tap-highlight-color:transparent;\">\n          <span style=\"font-size:14px;font-weight:900;color:inherit;\">💬 New Quotation<\u002Fspan>\n          <span id=\"acc-arrow-quote\" style=\"font-size:13px;color:#aaa;\">▼<\u002Fspan>\n        <\u002Fbutton>\n        <div id=\"caspitBody-quote\" style=\"display:none;padding:0 20px 16px;direction:rtl;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Invoice Info accordion -->\n      <div style=\"border-bottom:1px solid #f0f0f0;\">\n        <button id=\"acc-hdr-invoicelist\" onclick=\"toggleCaspitAccordion('invoicelist')\" style=\"width:100%;padding:14px 20px;background:none;border:none;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:Heebo,sans-serif;-webkit-tap-highlight-color:transparent;\">\n          <span style=\"font-size:14px;font-weight:900;color:inherit;\">📋 Last Invoices<\u002Fspan>\n          <span id=\"acc-arrow-invoicelist\" style=\"font-size:13px;color:#aaa;\">▼<\u002Fspan>\n        <\u002Fbutton>\n        <div id=\"caspitBody-invoicelist\" style=\"display:none;padding:0 20px 16px;direction:rtl;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- יומן תנועות accordion -->\n      <div style=\"border-bottom:1px solid #f0f0f0;\">\n        <button id=\"acc-hdr-txlog\" onclick=\"toggleCaspitAccordion('txlog')\" style=\"width:100%;padding:14px 20px;background:none;border:none;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:Heebo,sans-serif;-webkit-tap-highlight-color:transparent;\">\n          <span style=\"font-size:14px;font-weight:900;color:inherit;\">📊 יומן תנועות<\u002Fspan>\n          <span id=\"acc-arrow-txlog\" style=\"font-size:13px;color:#aaa;\">▼<\u002Fspan>\n        <\u002Fbutton>\n        <div id=\"caspitBody-txlog\" style=\"display:none;padding:0 20px 16px;direction:rtl;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div style=\"padding:8px 16px 0;border-top:1px solid #eee;flex-shrink:0;\">\n      <div id=\"caspitNotesArea\" style=\"margin-bottom:8px;\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;\">\n          <label style=\"font-size:11px;font-weight:700;color:#555;margin-bottom:0;\">Notes <span style=\"color:#2e7d32;font-size:10px;font-weight:400;\">👁 visible to client<\u002Fspan><\u002Flabel>\n          <span style=\"font-size:10px;color:#aaa;\">הערות שכן מוצגות ללקוח<\u002Fspan>\n        <\u002Fdiv>\n        <textarea id=\"caspitComments\" placeholder=\"Payment terms, warranty…\" style=\"width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;font-family:Heebo,sans-serif;box-sizing:border-box;resize:vertical;min-height:48px;line-height:1.5;margin-bottom:6px;\"><\u002Ftextarea>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;\">\n          <label style=\"font-size:11px;font-weight:700;color:#555;margin-bottom:0;\">Internal notes <span style=\"color:#888;font-size:10px;font-weight:400;\">🔒 not shown to client<\u002Fspan><\u002Flabel>\n          <span style=\"font-size:10px;color:#aaa;\">פרטים שלא מוצגים ללקוח<\u002Fspan>\n        <\u002Fdiv>\n        <textarea id=\"caspitDetails\" placeholder=\"Internal reminders…\" style=\"width:100%;padding:8px 10px;border:1.5px solid #eee;border-radius:8px;font-size:12px;font-family:Heebo,sans-serif;box-sizing:border-box;resize:vertical;min-height:48px;line-height:1.5;background:#fafafa;margin-bottom:8px;\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <button id=\"caspitCreateBtn\" onclick=\"caspitCreateDispatch()\" style=\"width:100%;padding:14px;background:#1F3A52;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;\">💼 Create Document<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Pre-Project Timer Picker -->\n<div id=\"preTimerPickerOverlay\" onclick=\"if(event.target===this)this.style.display='none'\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:10013;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:90vh;display:flex;flex-direction:column;font-family:Heebo,sans-serif;\">\n    <div style=\"padding:18px 20px 12px;border-bottom:1px solid #eee;flex-shrink:0;display:flex;justify-content:space-between;align-items:center;\">\n      <div style=\"font-size:17px;font-weight:900;color:#00695c;\">⏱ Pre-Project Timer<\u002Fdiv>\n      <button onclick=\"document.getElementById('preTimerPickerOverlay').style.display='none'\" style=\"background:none;border:none;font-size:22px;cursor:pointer;color:#888;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"preTimerPickerContent\" style=\"overflow-y:auto;flex:1;padding:16px 20px 32px;\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Pre-Project Timer Overlay -->\n<div id=\"preTimerOverlay\" onclick=\"if(event.target===this)closePreTimerOverlay()\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:10012;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;padding:24px 20px 36px;font-family:Heebo,sans-serif;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;\">\n      <div style=\"font-size:18px;font-weight:900;color:#00695c;\">⏱ Pre-Project Timer<\u002Fdiv>\n      <button onclick=\"closePreTimerOverlay()\" style=\"background:none;border:none;font-size:24px;cursor:pointer;color:#888;line-height:1;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"preTimerJobLabel\" style=\"font-size:13px;color:#888;margin-bottom:20px;\"><\u002Fdiv>\n    <div style=\"text-align:center;margin-bottom:24px;\">\n      <div id=\"preTimerDisplay\" style=\"font-size:56px;font-weight:900;letter-spacing:-2px;color:#00695c;font-variant-numeric:tabular-nums;\">00:00:00<\u002Fdiv>\n      <div id=\"preTimerStatus\" style=\"font-size:12px;color:#aaa;margin-top:4px;\">paused<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;margin-bottom:14px;\">\n      <button id=\"preTimerToggleBtn\" onclick=\"togglePreTimer()\" style=\"flex:1;padding:14px;background:#00695c;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;\">▶ Start<\u002Fbutton>\n      <button id=\"preTimerResetBtn\" onclick=\"resetPreTimer()\" style=\"padding:14px 18px;background:#f5f5f5;color:#888;border:1px solid #ddd;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;\">↺<\u002Fbutton>\n    <\u002Fdiv>\n    <button id=\"preTimerSaveBtn\" onclick=\"savePreTimerToSheet()\" style=\"width:100%;padding:14px;background:#16293A;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;\">💾 Save to Sheet<\u002Fbutton>\n    <button onclick=\"clearPreTimer()\" style=\"width:100%;margin-top:8px;padding:10px;background:transparent;border:none;font-size:13px;color:#ccc;cursor:pointer;font-family:Heebo,sans-serif;\">✕ Clear timer<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Work Log Overlay -->\n<div id=\"workLogOverlay\" onclick=\"if(event.target===this)this.style.display='none'\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:10011;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;display:flex;flex-direction:column;font-family:Heebo,sans-serif;\">\n    <div style=\"padding:16px 20px 12px;border-bottom:1px solid #eee;flex-shrink:0;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;\">\n        <div style=\"font-weight:900;font-size:17px;color:#16293A;\">📓 Work Log<\u002Fdiv>\n        <button onclick=\"document.getElementById('workLogOverlay').style.display='none'\" style=\"background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1;\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <input id=\"workLogSearch\" type=\"search\" placeholder=\"חפש לפי תאריך, פרוייקט, לקוח, מספר עבודה…\" oninput=\"renderWorkLog(this.value)\" style=\"width:100%;padding:10px 13px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;font-family:Heebo,sans-serif;outline:none;direction:rtl;box-sizing:border-box;\" onfocus=\"this.style.borderColor='#16293A'\" onblur=\"this.style.borderColor='#ddd'\">\n      <div id=\"workLogCount\" style=\"font-size:11px;color:#aaa;margin-top:6px;text-align:right;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"workLogList\" style=\"overflow-y:auto;flex:1;padding:0 16px 8px;\"><\u002Fdiv>\n    <div style=\"padding:12px 16px;border-top:1px solid #eee;flex-shrink:0;\">\n      <button onclick=\"copyWorkLogAll()\" style=\"width:100%;padding:12px;background:#16293A;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;\">📋 Copy All to Clipboard<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"toast\" id=\"toast\"><\u002Fdiv>\n\n<!-- Pending Quote Picker Overlay -->\n<div id=\"pendingQuoteOverlay\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10000;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:80vh;display:flex;flex-direction:column;\">\n    <div style=\"padding:16px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;\">\n      <div style=\"font-weight:700;font-size:17px;font-family:Heebo,sans-serif;\">Pending Quote Projects<\u002Fdiv>\n      <button onclick=\"document.getElementById('pendingQuoteOverlay').style.display='none'\" style=\"background:none;border:none;font-size:22px;cursor:pointer;color:#888;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"pendingQuoteList\" style=\"overflow-y:auto;flex:1;font-family:Heebo,sans-serif;direction:rtl;\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Complete Job Fields Modal -->\n<div id=\"completeJobOverlay\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10005;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;padding:20px;font-family:Heebo,sans-serif;direction:rtl;max-height:90vh;overflow-y:auto;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;\">\n      <div style=\"font-weight:700;font-size:17px;\">Complete Details<\u002Fdiv>\n      <button onclick=\"document.getElementById('completeJobOverlay').style.display='none'\" style=\"background:none;border:none;font-size:22px;cursor:pointer;color:#888;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"completeJobName\" style=\"font-size:13px;color:#888;margin-bottom:16px;\"><\u002Fdiv>\n    <div style=\"background:#fff8e1;border:1px solid #f0c040;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#7a5c00;\">\n      ⚠️ Missing fields — fill all to change status to Waiting for Execution\n    <\u002Fdiv>\n    <div style=\"margin-bottom:14px;\">\n      <div style=\"font-size:13px;color:#888;margin-bottom:6px;\">Category <span style=\"color:red\">*<\u002Fspan><\u002Fdiv>\n      <select id=\"cjCategory\" style=\"width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:Heebo,sans-serif;\" onchange=\"updateCompleteJobBtn()\">\n        <option value=\"\">Select category...<\u002Foption>\n        <option value=\"אחר\">Other<\u002Foption>\n        <option value=\"איטום\">Sealing<\u002Foption>\n        <option value=\"אינסטלציה\">Plumbing<\u002Foption>\n        <option value=\"אספקת חומרים\">Materials Supply<\u002Foption>\n        <option value=\"הובלות\">Transport<\u002Foption>\n        <option value=\"הנדימן\">Handyman<\u002Foption>\n        <option value=\"מסגרות\">Metalwork<\u002Foption>\n        <option value=\"נגרות\">Carpentry<\u002Foption>\n        <option value=\"עיצוב\">Design<\u002Foption>\n        <option value=\"פיקוח\">Supervision<\u002Foption>\n        <option value=\"פיתוח מוצר\">Product Development<\u002Foption>\n        <option value=\"צבע\">Paint<\u002Foption>\n        <option value=\"קבלנות\">Contracting<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;margin-bottom:14px;\">\n      <div style=\"flex:1;\">\n        <div style=\"font-size:13px;color:#888;margin-bottom:6px;\">Price per Unit <span style=\"color:red\">*<\u002Fspan><\u002Fdiv>\n        <input id=\"cjPrice\" type=\"number\" placeholder=\"0\" min=\"0\" oninput=\"updateCompleteJobBtn()\" style=\"width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:Heebo,sans-serif;box-sizing:border-box;\">\n      <\u002Fdiv>\n      <div style=\"flex:1;\">\n        <div style=\"font-size:13px;color:#888;margin-bottom:6px;\">Quantity <span style=\"color:red\">*<\u002Fspan><\u002Fdiv>\n        <input id=\"cjQty\" type=\"number\" placeholder=\"0\" min=\"0\" oninput=\"updateCompleteJobBtn()\" style=\"width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:Heebo,sans-serif;box-sizing:border-box;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-bottom:14px;\">\n      <div style=\"font-size:13px;color:#888;margin-bottom:6px;\">Estimated Hours <span style=\"color:red\">*<\u002Fspan><\u002Fdiv>\n      <input id=\"cjHours\" type=\"number\" placeholder=\"0\" min=\"0\" step=\"0.5\" oninput=\"updateCompleteJobBtn()\" style=\"width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:Heebo,sans-serif;box-sizing:border-box;\">\n    <\u002Fdiv>\n    <div style=\"margin-bottom:20px;\">\n      <div style=\"font-size:13px;color:#888;margin-bottom:6px;\">Purchase Order # <span style=\"color:red\">*<\u002Fspan><\u002Fdiv>\n      <input id=\"cjPO\" type=\"text\" placeholder=\"Purchase order number...\" maxlength=\"50\" oninput=\"updateCompleteJobBtn()\" style=\"width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:Heebo,sans-serif;box-sizing:border-box;\">\n    <\u002Fdiv>\n    <button id=\"completeJobBtn\" onclick=\"submitCompleteJob()\" disabled=\"\" style=\"width:100%;padding:14px;background:#555;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:Heebo,sans-serif;cursor:pointer;opacity:0.5;margin-bottom:10px;\">Fill all fields<\u002Fbutton>\n    <button onclick=\"savePartialJobFields()\" style=\"width:100%;padding:12px;background:transparent;color:#555;border:1.5px solid #ccc;border-radius:12px;font-size:14px;font-weight:600;font-family:Heebo,sans-serif;cursor:pointer;\">💾 Save Filled Fields to Sheet<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Stopwatch: fill details + set status (active card) -->\n<div id=\"swDetailsOverlay\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10006;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;padding:20px;font-family:Heebo,sans-serif;direction:rtl;max-height:90vh;overflow-y:auto;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;\">\n      <div style=\"font-weight:700;font-size:17px;\">מילוי פרטים<\u002Fdiv>\n      <button onclick=\"closeSwDetails()\" style=\"background:none;border:none;font-size:22px;cursor:pointer;color:#888;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"swName\" style=\"font-size:13px;color:#888;margin-bottom:10px;\"><\u002Fdiv>\n    <div style=\"background:#e3f2fd;border:1px solid #90caf9;border-radius:10px;padding:8px 12px;margin-bottom:16px;font-size:12px;color:#1F3A52;font-weight:700;\">⏱️ זמן בפועל בשעון: <span id=\"swActual\">0:00<\u002Fspan> — לעיון בלבד<\u002Fdiv>\n    <div style=\"margin-bottom:14px;\">\n      <div style=\"font-size:13px;color:#888;margin-bottom:6px;\">קטגוריה<\u002Fdiv>\n      <select id=\"swCat\" style=\"width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:Heebo,sans-serif;\">\n        <option value=\"\">בחר קטגוריה…<\u002Foption>\n        <option value=\"אחר\">אחר<\u002Foption>\n        <option value=\"איטום\">איטום<\u002Foption>\n        <option value=\"אינסטלציה\">אינסטלציה<\u002Foption>\n        <option value=\"אספקת חומרים\">אספקת חומרים<\u002Foption>\n        <option value=\"הובלות\">הובלות<\u002Foption>\n        <option value=\"הנדימן\">הנדימן<\u002Foption>\n        <option value=\"מסגרות\">מסגרות<\u002Foption>\n        <option value=\"נגרות\">נגרות<\u002Foption>\n        <option value=\"עיצוב\">עיצוב<\u002Foption>\n        <option value=\"פיקוח\">פיקוח<\u002Foption>\n        <option value=\"פיתוח מוצר\">פיתוח מוצר<\u002Foption>\n        <option value=\"צבע\">צבע<\u002Foption>\n        <option value=\"קבלנות\">קבלנות<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;margin-bottom:14px;\">\n      <div style=\"flex:1;\"><div style=\"font-size:13px;color:#888;margin-bottom:6px;\">מחיר ליחידה<\u002Fdiv>\n        <input id=\"swPrice\" type=\"number\" min=\"0\" placeholder=\"0\" style=\"width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:Heebo,sans-serif;box-sizing:border-box;\"><\u002Fdiv>\n      <div style=\"flex:1;\"><div style=\"font-size:13px;color:#888;margin-bottom:6px;\">כמות<\u002Fdiv>\n        <input id=\"swQty\" type=\"number\" min=\"0\" placeholder=\"0\" style=\"width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:Heebo,sans-serif;box-sizing:border-box;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-bottom:14px;\"><div style=\"font-size:13px;color:#888;margin-bottom:6px;\">הערכת שעות<\u002Fdiv>\n      <input id=\"swHours\" type=\"number\" min=\"0\" step=\"0.5\" placeholder=\"0\" style=\"width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:Heebo,sans-serif;box-sizing:border-box;\"><\u002Fdiv>\n    <div style=\"margin-bottom:18px;\"><div style=\"font-size:13px;color:#888;margin-bottom:6px;\">מספר רכש<\u002Fdiv>\n      <input id=\"swPO\" type=\"text\" maxlength=\"50\" placeholder=\"מספר הזמנת רכש…\" style=\"width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:Heebo,sans-serif;box-sizing:border-box;\"><\u002Fdiv>\n    <div style=\"border-top:1.5px solid #eee;padding-top:14px;\">\n      <div style=\"font-size:13px;font-weight:900;margin-bottom:10px;\">שנה סטטוס ל:<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;\">\n        <button onclick=\"swApplyStatus('progress')\" style=\"flex:1;padding:15px 8px;border:none;border-radius:12px;font-size:15px;font-weight:900;font-family:Heebo,sans-serif;color:#fff;background:#ef6c00;line-height:1.3;\">בתהליך ביצוע<span style=\"display:block;font-size:10px;font-weight:700;opacity:0.92;margin-top:3px;\">שומר · השעון ממשיך<\u002Fspan><\u002Fbutton>\n        <button onclick=\"swApplyStatus('done')\" style=\"flex:1;padding:15px 8px;border:none;border-radius:12px;font-size:15px;font-weight:900;font-family:Heebo,sans-serif;color:#fff;background:#2e7d32;line-height:1.3;\">בוצע<span style=\"display:block;font-size:10px;font-weight:700;opacity:0.92;margin-top:3px;\">שומר · עוצר וסוגר<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n      <button onclick=\"swApplyStatus('saveonly')\" style=\"width:100%;margin-top:12px;padding:11px;background:transparent;color:#555;border:1.5px solid #ccc;border-radius:12px;font-size:13.5px;font-weight:700;font-family:Heebo,sans-serif;cursor:pointer;\">💾 שמור פרטים בלבד (בלי שינוי סטטוס)<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Manage Jobs -->\n<div id=\"manageJobsOverlay\" style=\"display:none;position:fixed;inset:0;background:#eef2f6;z-index:10014;flex-direction:column;font-family:Heebo,sans-serif;direction:rtl;\">\n  <div style=\"background:#00695c;color:#fff;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;\">\n    <div style=\"font-size:18px;font-weight:900;\">🗂️ ניהול עבודות<\u002Fdiv>\n    <button onclick=\"closeManageJobs()\" style=\"background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:8px;padding:5px 12px;font-size:16px;font-weight:900;cursor:pointer;\">✕<\u002Fbutton>\n  <\u002Fdiv>\n  <div style=\"padding:14px 16px 8px;flex-shrink:0;\">\n    <select id=\"mjClient\" onchange=\"mjRenderList()\" style=\"width:100%;padding:13px;border:1.5px solid #b2dfdb;border-radius:12px;font-size:15px;font-family:Heebo,sans-serif;background:#fff;font-weight:700;color:#00695c;\">\n      <option value=\"\">— בחר לקוח —<\u002Foption>\n    <\u002Fselect>\n    <div style=\"background:#fff;border:1px solid #e0e7ec;border-radius:14px;padding:10px 12px;margin-top:10px;\">\n      <div style=\"display:flex;align-items:center;gap:8px;border:1.5px solid #ddd;border-radius:10px;padding:8px 10px;\">\n        <span>🔍<\u002Fspan><input id=\"mjQ\" type=\"text\" placeholder=\"חיפוש לפי תיאור או מספר עבודה…\" oninput=\"mjApplyFilter()\" style=\"border:none;outline:none;flex:1;font-size:14.5px;font-family:Heebo,sans-serif;background:transparent;\">\n      <\u002Fdiv>\n      <div onclick=\"mjToggleFilters()\" style=\"display:flex;align-items:center;justify-content:center;gap:7px;margin-top:9px;background:#e0f2f1;border:1.5px solid #00897b;border-radius:11px;padding:10px;cursor:pointer;color:#00695c;font-weight:900;font-size:13.5px;\">\n        🔧 סינון <span id=\"mjFBadge\" style=\"display:none;background:#00897b;color:#fff;border-radius:999px;font-size:10px;padding:1px 7px;font-weight:900;\"><\u002Fspan><span id=\"mjFArrow\" style=\"margin-right:auto;color:#00695c;font-size:12px;\">▴<\u002Fspan>\n      <\u002Fdiv>\n      <div id=\"mjFBody\" style=\"display:block;margin-top:10px;\">\n        <div style=\"display:flex;gap:8px;margin-bottom:8px;\">\n          <div style=\"flex:1;\"><div style=\"font-size:10.5px;color:#90a4ae;font-weight:700;margin-bottom:3px;\">סטטוס<\u002Fdiv>\n            <select id=\"mjFStatus\" onchange=\"mjApplyFilter()\" style=\"width:100%;padding:9px;border:1px solid #ddd;border-radius:9px;font-size:13px;font-family:Heebo,sans-serif;background:#fff;\"><option value=\"\">הכול<\u002Foption><option>ממתין להצעה<\u002Foption><option>ניתנה הצעה<\u002Foption><option>ממתין לביצוע<\u002Foption><option>בתהליך ביצוע<\u002Foption><option>בוצע<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div style=\"flex:1;\"><div style=\"font-size:10.5px;color:#90a4ae;font-weight:700;margin-bottom:3px;\">קטגוריה<\u002Fdiv>\n            <select id=\"mjFCat\" onchange=\"mjApplyFilter()\" style=\"width:100%;padding:9px;border:1px solid #ddd;border-radius:9px;font-size:13px;font-family:Heebo,sans-serif;background:#fff;\"><option value=\"\">הכול<\u002Foption><\u002Fselect><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-bottom:8px;\">\n          <div style=\"flex:1;\"><div style=\"font-size:10.5px;color:#90a4ae;font-weight:700;margin-bottom:3px;\">חשבונית<\u002Fdiv>\n            <select id=\"mjFInv\" onchange=\"mjApplyFilter()\" style=\"width:100%;padding:9px;border:1px solid #ddd;border-radius:9px;font-size:13px;font-family:Heebo,sans-serif;background:#fff;\"><option value=\"__all\">הכול<\u002Foption><option value=\"__none\">ללא<\u002Foption><option value=\"להוציא חש\">להוציא חש<\u002Foption><option value=\"הופקה\">הופקה<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div style=\"flex:1;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;\">\n          <div style=\"flex:1;\"><div style=\"font-size:10.5px;color:#90a4ae;font-weight:700;margin-bottom:3px;\">מתאריך התחלה<\u002Fdiv><input id=\"mjFFrom\" type=\"date\" onchange=\"mjApplyFilter()\" style=\"width:100%;padding:9px;border:1px solid #ddd;border-radius:9px;font-size:13px;font-family:Heebo,sans-serif;\"><\u002Fdiv>\n          <div style=\"flex:1;\"><div style=\"font-size:10.5px;color:#90a4ae;font-weight:700;margin-bottom:3px;\">עד תאריך התחלה<\u002Fdiv><input id=\"mjFTo\" type=\"date\" onchange=\"mjApplyFilter()\" style=\"width:100%;padding:9px;border:1px solid #ddd;border-radius:9px;font-size:13px;font-family:Heebo,sans-serif;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:6px;\">\n        <span id=\"mjCount\" style=\"font-size:11.5px;color:#607d8b;font-weight:700;\"><\u002Fspan>\n        <button onclick=\"mjClearFilters()\" style=\"font-size:12px;color:#c62828;font-weight:900;background:none;border:none;cursor:pointer;font-family:Heebo,sans-serif;\">נקה סינון ✕<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"mjChips\" style=\"display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"mjBulkBar\" style=\"display:none;align-items:center;justify-content:space-between;background:#ffebee;border:1.5px solid #ef9a9a;border-radius:12px;padding:9px 12px;margin-top:8px;\">\n      <button onclick=\"mjBulkDelete()\" style=\"background:#c62828;color:#fff;border:none;border-radius:9px;padding:9px 14px;font-size:13.5px;font-weight:900;font-family:Heebo,sans-serif;cursor:pointer;\">🗑️ מחק נבחרים (<span id=\"mjSelCount\">0<\u002Fspan>)<\u002Fbutton>\n      <button onclick=\"mjClearSelection()\" style=\"background:none;border:none;color:#c62828;font-weight:900;font-size:13px;cursor:pointer;font-family:Heebo,sans-serif;\">ביטול<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"mjList\" style=\"flex:1;overflow-y:auto;padding:0 16px 24px;\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Manage Jobs — edit sheet -->\n<div id=\"mjEditOverlay\" style=\"display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:10015;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:94vh;display:flex;flex-direction:column;font-family:Heebo,sans-serif;direction:rtl;\">\n    <div style=\"padding:16px 20px 10px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;\">\n      <div><div style=\"font-weight:900;font-size:17px;\">עריכת עבודה<\u002Fdiv><div id=\"mjEditId\" style=\"font-size:11px;color:#90a4ae;font-weight:700;\"><\u002Fdiv><\u002Fdiv>\n      <button onclick=\"mjCloseEdit()\" style=\"background:none;border:none;font-size:22px;color:#888;cursor:pointer;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"mjForm\" style=\"overflow-y:auto;padding:16px 20px;flex:1;\"><\u002Fdiv>\n    <div style=\"padding:12px 20px;border-top:1px solid #eee;display:flex;gap:10px;flex-shrink:0;background:#fff;\">\n      <button onclick=\"mjSave()\" style=\"flex:1;padding:14px;background:#00695c;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:900;font-family:Heebo,sans-serif;cursor:pointer;\">💾 שמור שינויים<\u002Fbutton>\n      <button onclick=\"mjAskDelete()\" style=\"padding:14px 16px;background:#fff;color:#c62828;border:1.5px solid #ef9a9a;border-radius:12px;font-size:14px;font-weight:900;font-family:Heebo,sans-serif;cursor:pointer;\">🗑️ מחק<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Manage Jobs — delete confirm -->\n<div id=\"mjConfirmOverlay\" style=\"display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:10016;align-items:center;justify-content:center;padding:24px;font-family:Heebo,sans-serif;direction:rtl;\">\n  <div style=\"background:#fff;border-radius:16px;padding:22px;max-width:330px;text-align:center;\">\n    <div style=\"font-size:34px;\">⚠️<\u002Fdiv>\n    <h3 style=\"margin:8px 0 4px;font-size:17px;\">למחוק את העבודה?<\u002Fh3>\n    <p id=\"mjConfirmMsg\" style=\"font-size:13px;color:#607d8b;margin:0 0 18px;line-height:1.6;\"><\u002Fp>\n    <div style=\"display:flex;gap:10px;\">\n      <button onclick=\"document.getElementById('mjConfirmOverlay').style.display='none';_mjBulkPending=null;\" style=\"flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:900;font-family:Heebo,sans-serif;border:none;background:#eceff1;color:#455a64;cursor:pointer;\">ביטול<\u002Fbutton>\n      <button onclick=\"mjConfirmDelete()\" style=\"flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:900;font-family:Heebo,sans-serif;border:none;background:#c62828;color:#fff;cursor:pointer;\">מחק לצמיתות<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- New Client Modal -->\n<div id=\"newClientOverlay\" style=\"display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10002;align-items:flex-end;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:20px 20px 0 0;width:100%;padding:20px;font-family:Heebo,sans-serif;max-height:90vh;overflow-y:auto;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;\">\n      <div style=\"font-weight:700;font-size:17px;\">➕ New Client<\u002Fdiv>\n      <button onclick=\"document.getElementById('newClientOverlay').style.display='none'\" style=\"background:none;border:none;font-size:22px;cursor:pointer;color:#888;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Client type -->\n    <div style=\"font-size:12px;font-weight:700;color:#555;margin-bottom:6px;\">Client Type<\u002Fdiv>\n    <div style=\"display:flex;gap:8px;margin-bottom:14px;\">\n      <button id=\"ncTypeBiz\" onclick=\"setNewClientType('Business')\" style=\"flex:1;padding:10px;border-radius:10px;border:2px solid #1F3A52;background:#e8f0fe;font-size:13px;font-weight:700;font-family:Heebo,sans-serif;cursor:pointer;color:#1F3A52;\">🏢 Business<\u002Fbutton>\n      <button id=\"ncTypeInd\" onclick=\"setNewClientType('Individual')\" style=\"flex:1;padding:10px;border-radius:10px;border:2px solid #ddd;background:#fff;font-size:13px;font-weight:700;font-family:Heebo,sans-serif;cursor:pointer;color:#555;\">👤 Individual<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Name -->\n    <div style=\"font-size:12px;font-weight:700;color:#555;margin-bottom:6px;\">Business Name <span style=\"color:#e53935;\">*<\u002Fspan><\u002Fdiv>\n    <input id=\"newClientName\" type=\"text\" placeholder=\"e.g. ROLLMAT\" maxlength=\"40\" style=\"width:100%;padding:12px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;font-family:Heebo,sans-serif;box-sizing:border-box;margin-bottom:10px;\" oninput=\"previewClientPrefix()\">\n    <div id=\"clientPrefixPreview\" style=\"font-size:12px;color:#888;margin-bottom:10px;min-height:16px;\"><\u002Fdiv>\n\n    <!-- Contact Name -->\n    <div style=\"font-size:12px;font-weight:700;color:#555;margin-bottom:6px;\">Contact Name<\u002Fdiv>\n    <input id=\"newClientContact\" type=\"text\" placeholder=\"e.g. David Cohen\" style=\"width:100%;padding:12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:Heebo,sans-serif;box-sizing:border-box;margin-bottom:10px;\">\n\n    <!-- Tax ID -->\n    <div style=\"font-size:12px;font-weight:700;color:#555;margin-bottom:6px;\">חפ / ע״מ (Tax ID)<\u002Fdiv>\n    <input id=\"newClientTaxId\" type=\"text\" inputmode=\"numeric\" placeholder=\"e.g. 515123456\" style=\"width:100%;padding:12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:Heebo,sans-serif;box-sizing:border-box;margin-bottom:10px;\">\n\n    <!-- Phone + Email -->\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;\">\n      <div>\n        <div style=\"font-size:12px;font-weight:700;color:#555;margin-bottom:6px;\">Phone<\u002Fdiv>\n        <input id=\"newClientPhone\" type=\"tel\" placeholder=\"050-1234567\" style=\"width:100%;padding:12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:Heebo,sans-serif;box-sizing:border-box;\">\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:12px;font-weight:700;color:#555;margin-bottom:6px;\">Email<\u002Fdiv>\n        <input id=\"newClientEmail\" type=\"email\" placeholder=\"info@...\" style=\"width:100%;padding:12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:Heebo,sans-serif;box-sizing:border-box;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Street + City -->\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;\">\n      <div>\n        <div style=\"font-size:12px;font-weight:700;color:#555;margin-bottom:6px;\">Street<\u002Fdiv>\n        <input id=\"newClientStreet\" type=\"text\" placeholder=\"Street…\" style=\"width:100%;padding:12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:Heebo,sans-serif;box-sizing:border-box;\">\n      <\u002Fdiv etails'); });\n}\n\nfunction _setCompleteExpensesOn(idx, val) {\n  var j = pendingQuoteJobs[idx]; if (!j) return;\n  j._expensesOn = val;\n  var bc = document.getElementById('cf_expClient_'+idx);\n  var bm = document.getElementById('cf_expMe_'+idx);\n  if (bc) { bc.style.border = '2px solid ' + (val==='client'?'#ff5252':'rgba(255,255,255,0.25)'); bc.style.background = val==='client'?'rgba(255,82,82,0.25)':'rgba(255,255,255,0.08)'; }\n  if (bm) { bm.style.border = '2px solid ' + (val==='me'?'#69f0ae':'rgba(255,255,255,0.25)'); bm.style.background = val==='me'?'rgba(105,240,174,0.2)':'rgba(255,255,255,0.08)'; }\n}\n\nfunction saveCompleteForm(idx, newStatus) {\n  var j = pendingQuoteJobs[idx];\n  if (!j) return;\n  var po       = (document.getElementById('cf_po_'+idx)||{}).value||'';\n  var category = (document.getElementById('cf_cat_'+idx)||{}).value||'';\n  var price    = parseFloat((document.getElementById('cf_pr_'+idx)||{}).value)||0;\n  var qty      = parseFloat((document.getElementById('cf_qt_'+idx)||{}).value)||0;\n  var hours    = parseFloat((document.getElementById('cf_eh_'+idx)||{}).value)||0;\n\n  // Block status change if PO, price or qty missing\n  if (newStatus && (!po.trim() || !price || !qty)) {\n    var hint = document.getElementById('cf_hint_'+idx);\n    if (hint) { hint.style.display = 'block'; hint.textContent = '⚠️ Fill PO + Price + Quantity to change status'; }\n    var poEl  = document.getElementById('cf_po_'+idx);\n    var prEl  = document.getElementById('cf_pr_'+idx);\n    var qtEl  = document.getElementById('cf_qt_'+idx);\n    if (poEl && !po.trim())  poEl.style.borderColor = 'rgba(255,100,0,0.9)';\n    if (prEl && !price)      prEl.style.borderColor = 'rgba(255,100,0,0.9)';\n    if (qtEl && !qty)        qtEl.style.borderColor = 'rgba(255,100,0,0.9)';\n    return;\n  }\n\n  var btn = document.querySelector('#completeForm_'+idx+' button:last-child');\n  if (btn) { btn.textContent = '⏳…'; btn.disabled = true; }\n\n  var expensesOn = j._expensesOn || '';\n  var calls = [\n    fetch(SHEETS_URL + '?action=updateJobFields&jobId=' + encodeURIComponent(j.id) + '&client=' + encodeURIComponent(j.client) +\n      '&po=' + encodeURIComponent(po) + '&category=' + encodeURIComponent(category) +\n      '&price=' + encodeURIComponent(price) + '&qty=' + encodeURIComponent(qty) +\n      '&hours=' + encodeURIComponent(hours)).then(function(r){return r.text();})\n  ];\n  // Persist expense attribution: recalc costs in sheet + sync to local project if present\n  if (expensesOn) {\n    calls.push(fetch(SHEETS_URL + '?action=recalcJobCosts&jobId=' + encodeURIComponent(j.id) +\n      '&client=' + encodeURIComponent(j.client) + '&expensesOn=' + encodeURIComponent(expensesOn)).then(function(r){return r.text();}));\n    try {\n      var lp = projects.find(function(p){ return p.jobId === j.id; });\n      if (lp) { lp._expensesOn = expensesOn; saveState(); }\n    } catch(e){}\n  }\n  if (newStatus) {\n    calls.push(fetch(SHEETS_URL + '?action=setStatus&jobId=' + encodeURIComponent(j.id) +\n      '&client=' + encodeURIComponent(j.client) + '&status=' + encodeURIComponent(newStatus)).then(function(r){return r.text();}));\n  }\n\n  Promise.all(calls).then(function() {\n    if (btn) { btn.textContent = newStatus ? '💾 ' + newStatus : '💾 Save fields only (no status change)'; btn.disabled = false; }\n    showToast(newStatus ? '✓ ' + j.id + ' → ' + newStatus : '✓ ' + j.id + ' fields saved');\n    if (newStatus) {\n      fetch(SHEETS_URL + '?action=getPendingQuote')\n        .then(function(r){return r.json();})\n        .then(function(data){ pendingQuoteJobs = data||[]; showPendingQuotePicker(pendingQuoteJobs); })\n        .catch(function(){});\n    }\n  }).catch(function(err){\n    if (btn) { btn.textContent = '💾'; btn.disabled = false; }\n    showToast('Error: ' + (err.message||''));\n  });\n}\n\nfunction pendingQuoteEdit(idx) {\n  var j = pendingQuoteJobs[idx];\n  if (!j) return;\n  var containerId = 'pqEdit_' + idx;\n  var existing = d
