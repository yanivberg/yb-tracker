;\n}\n\nfunction _caspitAskManualContact(clientName, payload, callback) {\n  var body = getCaspitBody();\n  var opts = '<option value=\"\">— בחר לקוח מכספית —<\u002Foption>';\n  _caspitContacts.forEach(function(c) {\n    opts += '<option value=\"' + (c.Id||c.ContactId||'') + '\">' + (c.Name||'') + '<\u002Foption>';\n  });\n  body.innerHTML = '<div style=\"padding:20px;\">' +\n    '<div style=\"font-size:14px;font-weight:700;margin-bottom:12px;color:#c62828;\">⚠️ הלקוח \"' + clientName + '\" לא נמצא בכספית<\u002Fdiv>' +\n    '<div style=\"font-size:13px;color:#555;margin-bottom:12px;\">Select contact manually from Caspit:<\u002Fdiv>' +\n    '<select id=\"manualContactPicker\" style=\"width:100%;padding:11px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:Heebo,sans-serif;margin-bottom:14px;\">' + opts + '<\u002Fselect>' +\n    '<button onclick=\"_caspitPickManual()\" style=\"width:100%;padding:13px;background:#1F3A52;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:Heebo,sans-serif;cursor:pointer;\">✓ המשך<\u002Fbutton>' +\n  '<\u002Fdiv>';\n  window._caspitManualCallback = callback;\n}\n\nfunction testCaspitProxy() {\n  showToast('Testing proxy…');\n  _caspitFetch(CASPIT_PROXY_URL + '?action=getContacts')\n    .then(function(r){ return r.json(); })\n    .then(function(d){ var p = _parseContactsResp(d); showToast(p.ok ? ('✓ Proxy OK — ' + p.list.length + ' contacts') : ('✗ Proxy error: ' + p.error), 4000); })\n    .catch(function(e){ showToast('✗ Proxy FAILED: ' + e.message, 5000); });\n}\n\nfunction _caspitFetch(url, options) {\n  return new Promise(function(resolve, reject) {\n    var timeout = setTimeout(function() { reject(new Error('timeout after 30s')); }, 30000);\n    fetch(url, options).then(function(r) {\n      clearTimeout(timeout); resolve(r);\n    }).catch(function(e) { clearTimeout(timeout); reject(e); });\n  });\n}\n\nfunction _caspitPickManual() {\n  var v = document.getElementById('manualContactPicker');\n  if (v && v.value && window._caspitManualCallback) window._caspitManualCallback(v.value);\n}\n\n// ── Quote tab ─────────────────────────────────────────\nfunction _renderCaspitQuoteTab() {\n  var body = getCaspitBody(); if (!body) return;\n  var createBtn = document.getElementById('caspitCreateBtn');\n  if (createBtn) createBtn.textContent = '💼 Save & Send to Caspit';\n\n  if (!_caspitContacts.length) {\n    body.innerHTML = '<div style=\"padding:32px;text-align:center;color:#aaa;\">⏳ Loading Caspit contacts…<\u002Fdiv>';\n    _caspitFetch(CASPIT_PROXY_URL + '?action=getContacts')\n      .then(function(r){ return r.json(); })\n      .then(function(data) { var p = _parseContactsResp(data); _caspitContacts = p.ok ? p.list : []; if(!p.ok) showToast('⚠️ Contacts error: ' + p.error, 5000); _renderCaspitQuoteForm(); })\n      .catch(function() { _renderCaspitQuoteForm(); });\n  } else {\n    _renderCaspitQuoteForm();\n  }\n}\n\nfunction _normalizeName(s) {\n  return (s||'').toLowerCase()\n    .replace(/['\"״׳`]/g,'')\n    .replace(/\\b(בעמ|בע\"מ|בע׳מ|ltd|limited|inc|llc|בעמ\\.?)\\b/g,'')\n    .replace(/[^a-z0-9\\u0590-\\u05ff]/g,' ')\n    .replace(/\\s+/g,' ').trim();\n}\n\nfunction _matchCaspitContact(sheetName, contacts) {\n  if (!sheetName || !contacts || !contacts.length) return null;\n  var nameNorm = _normalizeName(sheetName);\n\n  // 1. Exact match (case-insensitive)\n  for (var i=0; i<contacts.length; i++) {\n    if ((contacts[i].Name||'').toLowerCase() === sheetName.toLowerCase())\n      return { contact: contacts[i], score: 100, method: 'Exact match' };\n  }\n\n  // 2. Normalized exact match\n  for (var i=0; i<contacts.length; i++) {\n    if (_normalizeName(contacts[i].Name) === nameNorm)\n      return { contact: contacts[i], score: 95, method: 'Normalized match' };\n  }\n\n  // 3. Contains match (one contains the other)\n  var best = null, bestScore = 0;\n  for (var i=0; i<contacts.length; i++) {\n    var cNorm = _normalizeName(contacts[i].Name);\n    if (!cNorm || !nameNorm) continue;\n    if (cNorm.indexOf(nameNorm) !== -1 || nameNorm.indexOf(cNorm) !== -1) {\n      var score = Math.round(Math.min(cNorm.length, nameNorm.length) / Math.max(cNorm.length, nameNorm.length) * 90);\n      if (score > bestScore) { bestScore = score; best = contacts[i]; }\n    }\n  }\n  if (best && bestScore >= 75) return { contact: best, score: bestScore, method: 'Partial match' };\n\n  // 4. Fuzzy: token overlap\n  var tokens = nameNorm.split(' ').filter(function(t){return t.length>2;});\n  best = null; bestScore = 0;\n  for (var i=0; i<contacts.length; i++) {\n    var cTokens = _normalizeName(contacts[i].Name).split(' ').filter(function(t){return t.length>2;});\n    var matches = tokens.filter(function(t){ return cTokens.indexOf(t)!==-1; }).length;\n    if (!tokens.length || !cTokens.length) continue;\n    var score = Math.round(matches / Math.max(tokens.length, cTokens.length) * 85);\n    if (score > bestScore) { bestScore = score; best = contacts[i]; }\n  }\n  if (best && bestScore >= 70) return { contact: best, score: bestScore, method: 'Fuzzy match' };\n\n  return null;\n}\n\nvar _aiPriceMat = 1, _aiPriceWorkers = 2;\nfunction _aiPriceSetMat(v) {\n  _aiPriceMat = v;\n  var y = document.getElementById('aiMatYes'), n = document.getElementById('aiMatNo');\n  if (!y || !n) return;\n  if (v) { y.style.cssText='padding:4px 14px;border-radius:20px;border:1px solid #2D5F86;background:#e3f2fd;color:#2D5F86;font-size:12px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;'; n.style.cssText='padding:4px 14px;border-radius:20px;border:1px solid #ccc;background:#f5f5f5;color:#888;font-size:12px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;'; }\n  else { n.style.cssText='padding:4px 14px;border-radius:20px;border:1px solid #2D5F86;background:#e3f2fd;color:#2D5F86;font-size:12px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;'; y.style.cssText='padding:4px 14px;border-radius:20px;border:1px solid #ccc;background:#f5f5f5;color:#888;font-size:12px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;'; }\n}\nfunction _aiPriceSetW(w) {\n  _aiPriceWorkers = w;\n  document.querySelectorAll('.aiW').forEach(function(b) {\n    var sel = parseInt(b.getAttribute('data-w')) === w;\n    b.style.cssText = 'padding:4px 12px;border-radius:20px;border:1px solid '+(sel?'#2D5F86':'#ccc')+';background:'+(sel?'#e3f2fd':'#f5f5f5')+';color:'+(sel?'#2D5F86':'#888')+';font-size:12px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;';\n  });\n}\nfunction _getAIPriceSuggestion() {\n  var res = document.getElementById('aiPriceResult'); if (!res) return;\n  // Collect desc from all .cq-desc fields (concatenate non-empty ones)\n  var descEls = document.querySelectorAll('.cq-desc');\n  var desc = '';\n  descEls.forEach(function(el){ var v=(el.value||'').trim(); if(v) desc += (desc?', ':'')+v; });\n  // Fallback: use prefill description\n  if (!desc && _quotePrefill && _quotePrefill.desc) desc = _quotePrefill.desc;\n  var client = (document.getElementById('caspitQuoteSheetClient')||{}).value || '';\n  var hours = (_quotePrefill && _quotePrefill.hours) ? _quotePrefill.hours : 0;\n  if (!desc) { res.innerHTML = '<div style=\"color:#c62828;font-size:12px;\">⚠️ הכנס תיאור עבודה בשורות הפרויקט תחילה<\u002Fdiv>'; return; }\n  res.innerHTML = '<div style=\"font-size:12px;color:#888;padding:8px 0;direction:rtl;\">⏳ מחשב מחיר... (10-20 שניות)<\u002Fdiv>';\n  fetch(SHEETS_URL + '?action=getAIPriceSuggestion' +\n    '&desc=' + encodeURIComponent(desc) +\n    '&client=' + encodeURIComponent(client) +\n    '&cat=' + encodeURIComponent((_quotePrefill && _quotePrefill.category) || (document.getElementById('caspitQuoteCat')||{}).value || '') +\n    '&hours=' + encodeURIComponent(hours) +\n    '&workers=' + _aiPriceWorkers +\n    '&materials=' + _aiPriceMat +\n    '&_t=' + Date.now()\n  ).then(function(r){return r.json();}).then(function(d) {\n    if (d.error) { res.innerHTML = '<div style=\ count+' דומות':'') + '<\u002Fdiv>' +\n        (d.materials_est ? '<div style=\"font-size:9.5px;color:#388e3c;margin-top:4px;\">חומרים ₪'+(d.materials_est||0).toLocaleString()+' · עבודה ₪'+(d.labor_est||0).toLocaleString()+'<\u002Fdiv>' : '') +\n        '<button type=\"button\" onclick=\"_applyAIPriceAll(' + (d.min||0) + ')\" style=\"margin-top:8px;width:100%;border:none;border-radius:8px;padding:7px;font-size:11.5px;font-weight:900;cursor:pointer;font-family:Heebo,sans-serif;color:#fff;background:#2e7d32;\">בחר ₪' + min + ' ←<\u002Fbutton>' +\n      '<\u002Fdiv>';\n    res.innerHTML =\n      '<div style=\"direction:rtl;\">' +\n        '<div style=\"display:flex;gap:8px;\">' + mineCard + marketCard + '<\u002Fdiv>' +\n        (hasMine && d.min ? '<div style=\"font-size:10px;color:#555;margin-top:6px;text-align:center;\">פער מול שוק: ' + ((d.yb_med||0) >= (d.min||0) ? '+' : '') + '₪' + ((d.yb_med||0)-(d.min||0)).toLocaleString() + '<\u002Fdiv>' : '') +\n        (d.reasoning ? '<div style=\"font-size:10px;color:#555;margin-top:6px;\">' + d.reasoning + '<\u002Fdiv>' : '') +\n      '<\u002Fdiv>';\n  }).catch(function(e) { res.innerHTML = '<div style=\"color:#c62828;font-size:12px;\">⚠️ ' + e.message + '<\u002Fdiv>'; });\n}\n// Apply a chosen price to all quote rows that are still at 0 (or all if none set)\nfunction _applyAIPriceAll(val) {\n  if (!val) return;\n  var rows = document.querySelectorAll('#caspitQuoteRows > div');\n  var anySet = false;\n  rows.forEach(function(row){ var p = row.querySelector('.cq-price'); if (p && parseFloat(p.value) > 0) anySet = true; });\n  rows.forEach(function(row){ var p = row.querySelector('.cq-price'); if (p && (!anySet || parseFloat(p.value) === 0 || isNaN(parseFloat(p.value)))) p.value = val; });\n  if (typeof calcCaspitTotal === 'function') calcCaspitTotal();\n  showToast('✓ ₪' + val.toLocaleString() + ' הוחל על השורות');\n}\n// Fire-and-forget: refresh מחירון כללי (fast mode — no AI, preserves groups, slots new lines)\nfunction _pbFastRefresh() {\n  try { fetch(SHEETS_URL + '?action=buildPricebook&mode=fast&_t=' + Date.now()).catch(function(){}); } catch(_) {}\n}\n\n// Per-row AI pricing: analyzes every line item separately, shows ₪min–₪max + reasoning under each row (tap to apply)\nfunction _getAIPriceRows() {\n  var container = document.getElementById('caspitQuoteRows');\n  var msg = document.getElementById('aiRowsMsg');\n  var btn = document.getElementById('aiRowsBtn');\n  if (!container) return;\n  var rowEls = container.children;\n  var lines = [], hoursArr = [];\n  for (var i = 0; i < rowEls.length; i++) {\n    var dEl = rowEls[i].querySelector('.cq-desc');\n    var hEl = rowEls[i].querySelector('.cq-hours');\n    lines.push(dEl ? (dEl.value || '').trim() : '');\n    hoursArr.push(hEl ? (parseFloat(hEl.value) || 0) : 0);\n  }\n  if (!lines.some(function(l){ return l; })) { if (msg) msg.innerHTML = '<div style=\"color:#c62828;font-size:12px;direction:rtl;\">⚠️ הכנס תיאור לפחות לשורה אחת<\u002Fdiv>'; return; }\n  var client = (document.getElementById('caspitQuoteSheetClient') || {}).value || '';\n  if (msg) msg.innerHTML = '<div style=\"font-size:12px;color:#888;direction:rtl;\">⏳ מנתח כל שורה בנפרד... (10-30 שניות)<\u002Fdiv>';\n  if (btn) { btn.disabled = true; btn.textContent = '⏳ מנתח...'; }\n  fetch(SHEETS_URL + '?action=getAIPriceRows' +\n    '&lines=' + encodeURIComponent(JSON.stringify(lines)) +\n    '&hours=' + encodeURIComponent(JSON.stringify(hoursArr)) +\n    '&client=' + encodeURIComponent(client) +\n    '&workers=' + _aiPriceWorkers +\n    '&materials=' + _aiPriceMat +\n    '&_t=' + Date.now()\n  ).then(function(r){ return r.json(); }).then(function(d) {\n    if (btn) { btn.disabled = false; btn.textContent = '💡 הצע מחיר לכל השורות'; }\n    if (d.error) { if (msg) msg.innerHTML = '<div style=\"color:#c62828;font-size:12px;direction:rtl;\">⚠️ ' + d.error + '<\u002Fdiv>'; return; }\n    if (msg) msg.innerHTML = '';\n    var out = d.rows || [];\n    var rows2 = container.children;\n    for (var k = 0; k < rows2.length; k++) { _renderRowSuggestion(rows2[k], out[k], lines[k]); }\n  }).catch(function(e) { if (btn) { btn.disabled = false; btn.textContent = '💡 הצע מחיר לכל השורות'; } if (msg) msg.innerHTML = '<div style=\"color:#c62828;font-size:12px;direction:rtl;\">⚠️ ' + e.message + '<\u002Fdiv>'; });\n}\nfunction _renderRowSuggestion(rowDiv, sugg, desc) {\n  if (!rowDiv) return;\n  var slot = rowDiv.querySelector('.cq-sugg');\n  if (!slot) { slot = document.createElement('div'); slot.className = 'cq-sugg'; rowDiv.appendChild(slot); }\n  if (!desc) { slot.innerHTML = ''; return; }\n  var min = sugg ? Math.round(sugg.min || 0) : 0;\n  var max = sugg ? Math.round(sugg.max || 0) : 0;\n  if (!(min > 0 || max > 0)) { slot.innerHTML = '<div style=\"font-size:10px;color:#aaa;direction:rtl;margin-top:8px;\">אין הערכת AI לשורה זו<\u002Fdiv>'; return; }\n  slot.innerHTML =\n    '<div style=\"border:1.5px solid #bbdefb;background:#f5faff;border-radius:9px;padding:8px 10px;margin-top:8px;direction:rtl;\">' +\n      '<div style=\"font-size:10px;color:#2D5F86;font-weight:700;margin-bottom:5px;\">💡 המלצת AI — הקש מחיר כדי למלא<\u002Fdiv>' +\n      '<div style=\"display:flex;gap:6px;align-items:center;flex-wrap:wrap;\">' +\n        '<button type=\"button\" class=\"cq-sg-min\" style=\"font-size:14px;font-weight:900;color:#1F3A52;background:#e3f2fd;border:1px solid #90caf9;border-radius:8px;padding:4px 11px;cursor:pointer;font-family:Heebo,sans-serif;\">₪' + min.toLocaleString() + '<span style=\"font-size:8px;font-weight:700;color:#1976d2;display:block;\">לא פחות מ-<\u002Fspan><\u002Fbutton>' +\n        '<span style=\"color:#90a4ae;font-weight:900;\">–<\u002Fspan>' +\n        '<button type=\"button\" class=\"cq-sg-max\" style=\"font-size:14px;font-weight:900;color:#1F3A52;background:#e3f2fd;border:1px solid #90caf9;border-radius:8px;padding:4px 11px;cursor:pointer;font-family:Heebo,sans-serif;\">₪' + max.toLocaleString() + '<span style=\"font-size:8px;font-weight:700;color:#1976d2;display:block;\">תקרה<\u002Fspan><\u002Fbutton>' +\n      '<\u002Fdiv>' +\n      (sugg && sugg.reasoning ? '<div style=\"font-size:10px;color:#555;margin-top:6px;line-height:1.5;\">' + sugg.reasoning + '<\u002Fdiv>' : '') +\n      '<div class=\"cq-sg-applied\" style=\"font-size:10px;color:#2e7d32;font-weight:700;margin-top:5px;display:none;\">✓ הוחל על השורה<\u002Fdiv>' +\n    '<\u002Fdiv>';\n  var applied = slot.querySelector('.cq-sg-applied');\n  slot.querySelector('.cq-sg-min').addEventListener('click', function(){ _applyRowPrice(rowDiv, min, applied); });\n  slot.querySelector('.cq-sg-max').addEventListener('click', function(){ _applyRowPrice(rowDiv, max, applied); });\n}\nfunction _applyRowPrice(rowDiv, val, appliedEl) {\n  var p = rowDiv.querySelector('.cq-price'); if (p) p.value = val;\n  if (appliedEl) appliedEl.style.display = 'block';\n  calcCaspitTotal();\n}\n\nvar _quoteMode = 'new'; // 'new' or 'edit'\nvar _editQuoteDoc = null; // full Caspit document being edited\nvar _recentQuotes = null;\nfunction _setQuoteMode(mode) {\n  _quoteMode = mode;\n  _editQuoteDoc = null;\n  _recentQuotes = null; // always re-fetch on open\n  _pendingQuoteIds = [];\n  _renderCaspitQuoteTab();\n  if (mode === 'edit') _loadRecentQuotes();\n}\n\nfunction _loadRecentQuotes() {\n  var listEl = document.getElementById('editQuoteList');\n  if (!listEl) return;\n  if (_recentQuotes) { _renderQuoteList(_recentQuotes); return; }\n  listEl.innerHTML = '<div style=\"font-size:12px;color:var(--color-text-secondary);padding:8px 0;\">⏳ טוען הצעות אחרונות...<\u002Fdiv>';\n  fetch(SHEETS_URL + '?action=searchQuotes&_t=' + Date.now())\n  .then(function(r){return r.json();}).then(function(docs){\n    _recentQuotes = Array.isArray(docs) ? docs : [];\n    _renderQuoteList(_recentQuotes);\n  }).catch(function(e){ if(listEl) listEl.innerHTML='<div style=\"font-size:12px;color:var(--color-text-danger);\">⚠️ '+e.message+'<\u002Fdiv>'; });\n}\n\n// ── Pending-quote mode (spre tolerant of slow contact load\n  function _applyQuotePrefill() {\n    var prefillLines = (_quotePrefill && _quotePrefill.lines && _quotePrefill.lines.length)\n      ? _quotePrefill.lines\n      : (_quotePrefill && _quotePrefill.desc ? [_quotePrefill.desc] : []);\n    if (!prefillLines.length) return;\n\n    // Clear existing rows and rebuild from lines\n    var container = document.getElementById('caspitQuoteRows');\n    if (!container) return;\n    container.innerHTML = '';\n    prefillLines.forEach(function(line, li) {\n      addCaspitQuoteRow();\n      var allDescs   = container.querySelectorAll('.cq-desc');\n      var allQtys    = container.querySelectorAll('.cq-qty');\n      var allPrices  = container.querySelectorAll('.cq-price');\n      var last = allDescs.length - 1;\n      if (allDescs[last])  allDescs[last].value  = line;\n      var pQty   = _quotePrefill.pendingQtys   && _quotePrefill.pendingQtys[li];\n      var pPrice = _quotePrefill.pendingPrices && _quotePrefill.pendingPrices[li];\n      if (allQtys[last]   && pQty)   allQtys[last].value   = pQty;\n      if (allPrices[last] && pPrice) allPrices[last].value = pPrice;\n    });\n    calcCaspitTotal();\n\n    // AI steps → internal notes\n    var steps = (_quotePrefill && _quotePrefill.steps) ? _quotePrefill.steps.filter(Boolean) : [];\n    if (steps.length) {\n      var detailsEl = document.getElementById('caspitDetails');\n      if (detailsEl && !detailsEl.value) {\n        detailsEl.value = steps.map(function(s, idx) { return (idx+1) + '. ' + s; }).join('\\n');\n      }\n    }\n\n    _pendingQuoteIds = (_quotePrefill && _quotePrefill.pendingIds) ? _quotePrefill.pendingIds.slice() : [];\n\n    // Append job notes (from sheet הערות) into Details field (internal, not shown to client)\n    var pendingNotes = (_quotePrefill && _quotePrefill.pendingNotes) ? _quotePrefill.pendingNotes.filter(function(n){ return n && n.trim(); }) : [];\n    if (pendingNotes.length) {\n      var detailsEl = document.getElementById('caspitDetails');\n      if (detailsEl) {\n        var existing = detailsEl.value ? detailsEl.value.trimRight() + '\\n\\n' : '';\n        detailsEl.value = existing + pendingNotes.join('\\n');\n      }\n    }\n\n    _quotePrefill = {}; // consume — prevent re-apply on re-render\n  }\n  setTimeout(_applyQuotePrefill, 150);\n\n  // Load sheet clients and auto-select from prefill\n  fetch(SHEETS_URL + '?action=getClients')\n    .then(function(r){ return r.json(); })\n    .then(function(tabs) {\n      var sel = document.getElementById('caspitQuoteSheetClient');\n      if (!sel) return;\n      var sorted = (tabs||[]).sort(function(a,b){ return a.localeCompare(b); });\n      sel.innerHTML = '<option value=\"\">— Select sheet client —<\u002Foption>';\n      sorted.forEach(function(c){ sel.innerHTML += '<option value=\"' + c.replace(/\"/g,'&quot;') + '\">' + c + '<\u002Foption>'; });\n      // Auto-select client from briefing\n      if (_quotePrefill && _quotePrefill.client) {\n        var pref = _quotePrefill.client.trim().toLowerCase();\n        for (var i = 0; i < sel.options.length; i++) {\n          if (sel.options[i].value.trim().toLowerCase() === pref) {\n            sel.value = sel.options[i].value;\n            _autoMatchCaspitClient();\n            break;\n          }\n        }\n      }\n    })\n    .catch(function() {\n      var sel = document.getElementById('caspitQuoteSheetClient');\n      if (sel) sel.innerHTML = '<option value=\"\">— Error loading clients —<\u002Foption>';\n    });\n}\n\nfunction _autoMatchCaspitClient() {\n  var sheetSel = document.getElementById('caspitQuoteSheetClient');\n  var contactSel = document.getElementById('caspitQuoteContact');\n  if (!sheetSel || !contactSel) return;\n  var clientName = sheetSel.value;\n  if (!clientName) return;\n  // Try match map first, then fuzzy match\n  var contactId = _caspitMatchMap[clientName] || '';\n  if (!contactId) {\n    var m = _matchCaspitContact(clientName, _caspitContacts);\n    if (m && m.score >= 60) contactId = m.contact.Id || m.contact.ContactId || '';\n  }\n  if (contactId) contactSel.value = contactId;\n  _updateQuoteContactInfo();\n}\n\nfunction _updateQuoteContactInfo() {\n  var contactSel = document.getElementById('caspitQuoteContact');\n  var infoEl = document.getElementById('caspitQuoteContactInfo');\n  if (!infoEl) return;\n  var contactId = contactSel ? contactSel.value : '';\n  infoEl.innerHTML = _caspitContactInfoHtml(contactId);\n}\n\nfunction addCaspitQuoteRow() {\n  var container = document.getElementById('caspitQuoteRows');\n  if (!container) return;\n  var idx = container.children.length + 1;\n  var div = document.createElement('div');\n  div.style.cssText = 'background:#f8f9fa;border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid #eee;position:relative;';\n  div.innerHTML =\n    '<div style=\"font-size:10px;font-weight:700;color:#aaa;margin-bottom:5px;\">Row ' + idx + '<\u002Fdiv>' +\n    '<button onclick=\"delCaspitQuoteRow(this)\" type=\"button\" style=\"position:absolute;top:8px;right:8px;background:none;border:none;color:#ccc;font-size:15px;cursor:pointer;padding:2px 5px;\">✕<\u002Fbutton>' +\n    '<div style=\"display:grid;grid-template-columns:1fr 60px 80px;gap:6px;margin-bottom:6px;\">' +\n      '<div><div style=\"font-size:10px;color:#888;margin-bottom:3px;\">Description<\u002Fdiv><input type=\"text\" class=\"cq-desc\" placeholder=\"…\" oninput=\"calcCaspitTotal()\" style=\"width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:Heebo,sans-serif;box-sizing:border-box;\"><\u002Fdiv>' +\n      '<div><div style=\"font-size:10px;color:#888;margin-bottom:3px;\">Qty<\u002Fdiv><input type=\"number\" class=\"cq-qty\" value=\"1\" oninput=\"calcCaspitTotal()\" style=\"width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:Heebo,sans-serif;box-sizing:border-box;\"><\u002Fdiv>' +\n      '<div><div style=\"font-size:10px;color:#888;margin-bottom:3px;\">Price (₪)<\u002Fdiv><input type=\"number\" class=\"cq-price\" value=\"0\" oninput=\"calcCaspitTotal()\" style=\"width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:Heebo,sans-serif;box-sizing:border-box;\"><\u002Fdiv>' +\n    '<\u002Fdiv>' +\n    '<div style=\"display:flex;align-items:center;gap:8px;\">' +\n      '<div style=\"font-size:10px;color:#888;white-space:nowrap;\">Est. Hours<\u002Fdiv>' +\n      '<input type=\"number\" class=\"cq-hours\" value=\"0.5\" step=\"0.5\" min=\"0\" style=\"width:80px;padding:6px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;font-family:Heebo,sans-serif;box-sizing:border-box;\">' +\n      '<span style=\"font-size:11px;color:#aaa;\">hrs<\u002Fspan>' +\n    '<\u002Fdiv>';\n  container.appendChild(div);\n  calcCaspitTotal();\n  div.querySelector('.cq-desc').focus();\n}\n\nfunction delCaspitQuoteRow(btn) {\n  var container = document.getElementById('caspitQuoteRows');\n  if (!container || container.children.length <= 1) return;\n  btn.closest('div[style]').remove();\n  var rows = container.children;\n  for (var i = 0; i < rows.length; i++) { var n = rows[i].querySelector('div'); if (n) n.textContent = 'Row ' + (i+1); }\n  calcCaspitTotal();\n}\n\nfunction calcCaspitTotal() {\n  var container = document.getElementById('caspitQuoteRows');\n  if (!container) return;\n  var total = 0;\n  var rows = container.children;\n  for (var i = 0; i < rows.length; i++) {\n    var row = rows[i];\n    var qtyEl   = row.querySelector('.cq-qty');\n    var priceEl = row.querySelector('.cq-price');\n    var qty   = qtyEl   ? (parseFloat(qtyEl.value)   || 0) : 0;\n    var price = priceEl ? (parseFloat(priceEl.value)  || 0) : 0;\n    total += qty * price;\n  }\n  var isZero = total === 0;\n  var box   = document.getElementById('caspitQuoteTotalBox');\n  var lbl   = document.getElementById('caspitTotalLabel');\n  var val   = document.getElementById('caspitQuoteTotal');\n  var hint  = document.getElementById('caspitStatusHint');\n  var cnt   = document.getElementById('caspitRowCount');\n  if (box)  box.style.background  = isZero ? '#fff3e0' : '#e8f5e9';\n  if (lbl)  { lbl.style.color = isZero ? '#e65100' : '#2e7d32'; lbl.textContent = isZero ? 'Total = 0 — prices TBD' : 'Total (excl. VAT)'; }\n  if (val)  { val.style.color = isZero ? '#e65100' : '#1b5e20'; val.textContent = '₪' + total.toLocaleString(); }\n  if (hint) hint.innerHTML = 'Status after sending: <strong style=\"color:' + (isZero?'#e65100':'#1F3A52') + '\">' + (isZero?'Waiting for Quote':'Quote Given') + '<\u002Fstrong>';\n  if (cnt)  { cnt.textContent = rows.length + ' row' + (rows.length!==1?'s':''); }\n}\n\nfunction createCaspitQuote() {\n  var contactId   = (document.getElementById('caspitQuoteContact')||{}).value||'';\n  var sheetClient = (document.getElementById('caspitQuoteSheetClient')||{}).value||'';\n  if (!contactId)   { showToast('Select a Caspit contact'); return; }\n  if (!sheetClient) { showToast('Select a sheet client'); return; }\n\n  // Collect rows\n  var container = document.getElementById('caspitQuoteRows');\n  var rowData = [];\n  var total = 0;\n  if (container) {\n    for (var ri = 0; ri < container.children.length; ri++) {\n      var row = container.children[ri];\n      var desc  = (row.querySelector('.cq-desc') ||{}).value||'';\n      var qty   = parseFloat((row.querySelector('.cq-qty')  ||{}).value)||1;\n      var price = parseFloat((row.querySelector('.cq-price')||{}).value)||0;\n      var hours = parseFloat((row.querySelector('.cq-hours')||{}).value)||0;\n      rowData.push({ desc: desc||'—', qty: qty, price: price, hours: hours });\n      total += qty * price;\n    }\n  }\n  if (!rowData.length) { showToast('Add at least one line item'); return; }\n\n  var btn = document.getElementById('caspitCreateBtn');\n  btn.textContent = '⏳ Saving to sheet…'; btn.disabled = true;\n\n  var selectedContact = _caspitContacts.filter(function(c){ return (c.Id||c.ContactId||'') === contactId; })[0];\n  var customerName = selectedContact ? (selectedContact.Name || '') : '';\n  var finalStatus  = total > 0 ? 'ניתנה הצעה' : 'ממתין להצעה';\n\n  // Step 1: Save all rows in ONE bulk call\n  var jobIds = [];\n  var bulkRows = rowData.map(function(r) {\n    return { desc: r.desc, st: 'ממתין להצעה', pr: r.price, qt: r.qty, eh: r.hours };\n  });\n  var saveSequential = fetch(SHEETS_URL + '?action=addJobsBulk&client=' + encodeURIComponent(sheetClient) + '&noDate=1&notes=' + encodeURIComponent((document.getElementById('caspitDetails')||{value:''}).value||'') + '&rows=' + encodeURIComponent(JSON.stringify(bulkRows))\n  ).then(function(r){ return r.json(); })\n  .then(function(ids){ jobIds = ids || []; });\n\n  saveSequential.then(function() {\n    if (!jobIds.length) { showToast('⚠️ Step 1 failed: sheet save returned no IDs'); btn.textContent = '💼 Save & Send to Caspit'; btn.disabled = false; return; }\n    _pbFastRefresh();   // accumulate these lines into מחירון כללי (fast, background)\n    btn.textContent = '⏳ Sending to Caspit…';\n    var lines = rowData.map(function(r) {\n      return { ProductName: r.desc, Details: r.desc, Qty: r.qty, UnitPrice: r.price > 0 ? r.price : 0.01, ChargeVAT: true };\n    });\n    var comments = (document.getElementById('caspitComments')||{}).value||'';\n    var details  = (document.getElementById('caspitDetails')||{}).value||'';\n    var payload = {\n      TrxTypeId: 16, DocumentId: 'YB-Q-' + Date.now(), DocumentSource: 2,\n      DocumentNumberBranch: 1, TrxCodeNumber: 3, ChargeVAT: true, ContactId: contactId,\n      CustomerBusinessName: customerName || undefined,\n      CustomerOsekMorshe: selectedContact ? (selectedContact.OsekMorshe || undefined) : undefined,\n      CustomerAddress:    selectedContact ? (selectedContact.Address  || undefined) : undefined,\n      CustomerCity:       selectedContact ? (selectedContact.City     || undefined) : undefined,\n      CustomerPhone:      selectedContact ? (selectedContact.Phone    || undefined) : undefined,\n      CustomerEmail:      selectedContact ? (selectedContact.Email    || undefined) : undefined,\n      Comments: comments || undefined,\n      Details:  details  || undefined,\n      SendByEmail: true, Email: 'yanivberg@icloud.com',\n      DocumentLines: lines\n    };\n    return _caspitFetch(CASPIT_PROXY_URL + '?action=createDocument', {\n      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)\n    }).then(function(r){ return r.json(); })\n    .then(function(result) {\n      // Update status on all saved rows to ניתנה הצעה\n      var statusUpdates = jobIds.filter(function(jid){ return jid && jid.indexOf('Error') === -1; });\n      Promise.all(statusUpdates.map(function(jid) {\n        return fetch(SHEETS_URL + '?action=setStatus&jobId=' + encodeURIComponent(jid) +\n          '&client=' + encodeURIComponent(sheetClient) + '&status=' + encodeURIComponent(finalStatus));\n      })).then(function() {\n        if (statusUpdates.length > 0) showToast('✓ ' + statusUpdates.length + ' rows → ' + finalStatus);\n      }).catch(function(){});\n      // Advance the original \"ממתין להצעה\" sheet jobs that seeded this quote → ניתנה הצעה\n      if (_pendingQuoteIds && _pendingQuoteIds.length) {\n        var _pq = _pendingQuoteIds.slice(); _pendingQuoteIds = [];\n        Promise.all(_pq.map(function(pid){\n          return fetch(SHEETS_URL + '?action=setStatus&jobId=' + encodeURIComponent(pid) +\n            '&client=' + encodeURIComponent(sheetClient) + '&status=' + encodeURIComponent('ניתנה הצעה'));\n        })).then(function(){ showToast('✓ ' + _pq.length + ' עבודות ממתינות → ניתנה הצעה'); }).catch(function(){});\n      }\n      btn.textContent = '💼 Save & Send to Caspit'; btn.disabled = false;\n      showCaspitLog(result);\n      if (result && (result.DocumentNumber || result.number || result.Id || result.documentId)) {\n        var docNumber = result.DocNo || result.docNo || result.DocumentNumber || result.documentNumber || result.number || result.Number || result.DocNumber || '';\n        var docId     = result.documentId || result.Id || '';\n        var pdfLink   = (result.rawResponse && result.rawResponse.LinkToPdf) ? result.rawResponse.LinkToPdf : '';\n        var createdAt = new Date().toLocaleDateString('he-IL');\n        var jobIdsCsv = jobIds.filter(function(j){ return j && j.indexOf('Error')===-1; }).join(',');\n        fetch(SHEETS_URL + '?action=saveCaspitDocument' +\n          '&jobId='     + encodeURIComponent(jobIds[0]||'') +\n          '&client='    + encodeURIComponent(sheetClient) +\n          '&jobIds='    + encodeURIComponent(jobIdsCsv) +\n          '&docId='     + encodeURIComponent(docId) +\n          '&docNumber=' + encodeURIComponent(docNumber) +\n          '&trxTypeId=16' +\n          '&total='     + encodeURIComponent(Math.round(total)) +\n          '&pdfLink='   + encodeURIComponent(pdfLink) +\n          '&createdAt=' + encodeURIComponent(createdAt)\n        ).catch(function(){});\n        _caspitShowSuccess(result);\n        setTimeout(function(){ showToast('📧 Email sent → yanivberg@icloud.com'); }, 1800);\n        document.getElementById('caspitOverlay').style.display = 'none';\n      } else {\n        var errDetail = result.error || result.Message || result.ErrorMessage || result.message || JSON.stringify(result).slice(0,120);\n        showToast('⚠️ Caspit error: ' + errDetail, 6000);\n      }\n    });\n  }).catch(function(err) {\n    btn.textContent = '💼 Save & Send to Caspit'; btn.disabled = false;\n    showToast('⚠️ Step 2 error: ' + (err.message||String(err)), 6000);\n  });\n}\n// ── End Caspit ────────────────────────────────────────\n\n\n// ── AI Advisor ────────────────────────────────────────────\nfunction openAIAdvisor() {\n  var overlay = document.getElementById('aiAdvisorOverlay');\n  overlay.style.display = 'flex';\n  var body = document.getElementById('aiAdvisorBody');\n\n  // Show choice screen — no default\n  || '';\n  var btn = document.getElementById('bundleSendBtn');\n  if (btn) btn.textContent = client ? ('📤 שלח מסמכי ' + client) : '📤 שלח מסמכי חודש';\n}\nfunction _sendMonthlyBundle() {\n  var monthEl = document.getElementById('bundleMonth');\n  var btn = document.getElementById('bundleSendBtn');\n  var status = document.getElementById('bundleStatus');\n  if (!monthEl || !monthEl.value) { if(status) status.innerHTML='<div style=\"color:#c62828;font-size:12px;\">בחר חודש תחילה<\u002Fdiv>'; return; }\n  // Convert YYYY-MM to MM/YYYY\n  var parts = monthEl.value.split('-');\n  var month = parts[1] + '/' + parts[0];\n  var types = [];\n  document.querySelectorAll('.bundle-type:checked').forEach(function(cb){ types.push(cb.value); });\n  if (!types.length) { if(status) status.innerHTML='<div style=\"color:#c62828;font-size:12px;\">בחר לפחות סוג מסמך אחד<\u002Fdiv>'; return; }\n  var bundleClient = (document.getElementById('bundleClient') || {}).value || '';\n  btn.disabled = true; btn.textContent = '⏳ מוריד ושולח...';\n  if (status) status.innerHTML = '<div style=\"font-size:12px;color:#888;direction:rtl;\">⏳ מוריד PDF לכל מסמך' + (bundleClient ? (' של ' + bundleClient) : '') + '... עשוי לקחת 30-60 שניות<\u002Fdiv>';\n  fetch(SHEETS_URL + '?action=sendMonthlyBundle&month=' + encodeURIComponent(month) + '&types=' + encodeURIComponent(types.join(',')) + (bundleClient ? '&client=' + encodeURIComponent(bundleClient) : '') + '&_t=' + Date.now())\n  .then(function(r){ return r.json(); })\n  .then(function(d) {\n    btn.disabled = false; _bundleClientChanged();\n    if (d.ok) {\n      status.innerHTML = '<div style=\"font-size:13px;color:#2e7d32;padding:10px;background:#e8f5e9;border-radius:8px;font-weight:700;direction:rtl;\">✓ נשלח! '+d.sent+' מסמכים ל-yanivberg@icloud.com' + (d.errors&&d.errors.length?' · '+d.errors.length+' שגיאות':'') + '<\u002Fdiv>';\n    } else {\n      status.innerHTML = '<div style=\"font-size:12px;color:#c62828;padding:8px;background:#fce4ec;border-radius:8px;direction:rtl;\">⚠️ '+(d.error||'שגיאה')+'<\u002Fdiv>';\n    }\n  }).catch(function(e){ btn.disabled=false; _bundleClientChanged(); if(status) status.innerHTML='<div style=\"color:#c62828;font-size:12px;\">⚠️ '+e.message+'<\u002Fdiv>'; });\n}\n\nfunction _sendTransactionLog() {\n  var from  = (document.getElementById('txlogFrom')||{}).value;\n  var to    = (document.getElementById('txlogTo')||{}).value;\n  var email = (document.getElementById('txlogEmail')||{}).value.trim();\n  var types = Array.from(document.querySelectorAll('.txlog-type:checked')).map(function(cb){ return cb.value; });\n  var btn   = document.getElementById('txlogSendBtn');\n  var status= document.getElementById('txlogStatus');\n  if (!from || !to)   { showToast('בחר טווח תאריכים'); return; }\n  if (!types.length)  { showToast('בחר לפחות סוג מסמך אחד'); return; }\n  if (!email)         { showToast('הכנס כתובת מייל'); return; }\n  btn.disabled = true; btn.textContent = '⏳ שולח…';\n  status.style.display = 'block';\n  status.innerHTML = '<div style=\"font-size:12px;color:#1F3A52;padding:8px;background:#e8eaf6;border-radius:8px;\">מושך נתונים מכספית…<\u002Fdiv>';\n  fetch(SHEETS_URL + '?action=sendTransactionLog' +\n    '&from='  + encodeURIComponent(from) +\n    '&to='    + encodeURIComponent(to) +\n    '&types=' + encodeURIComponent(types.join(',')) +\n    '&email=' + encodeURIComponent(email))\n    .then(function(r){ return r.json(); })\n    .then(function(d) {\n      if (d.ok) {\n        var msg = d.mailSent\n          ? '✓ ' + d.count + ' תנועות — ' + d.pdfAttached + ' PDF נשלחו ל-' + (d.toEmail||email)\n          : '✓ ' + d.count + ' תנועות — פותח דוח ↗' +\n            (d.pdfError ? '\\n⚠️ PDF: ' + d.pdfError.slice(0,120) : '') +\n            (d.debugFirstDoc ? '\\n🔍 DocumentId=' + JSON.stringify(d.debugFirstDoc) : '') +\n            (d.pdfAttempted===0 ? ' (אין DocumentId)' : '');\n        status.innerHTML = '<div style=\"font-size:13px;color:#2e7d32;padding:10px;background:#e8f5e9;border-radius:8px;font-weight:700;\">' + msg + '<\u002Fdiv>';\n        btn.textContent = '📧 שלח שוב';\n        btn.disabled = false;\n        // Open HTML only if email failed\n        if (!d.mailSent && d.html) {\n          var blob = new Blob([d.html], {type:'text/html;charset=utf-8'});\n          var blobUrl = URL.createObjectURL(blob);\n          window.open(blobUrl, '_blank');\n        }\n      } else {\n        status.innerHTML = '<div style=\"font-size:12px;color:#c62828;padding:8px;background:#fce4ec;border-radius:8px;\">⚠️ ' + (d.error||'שגיאה') +\n          (d.debug ? '<br><small style=\"color:#888;word-break:break-all;\">from:'+d.debug.from+' to:'+d.debug.to+' types:'+d.debug.types+\n          '<br>'+JSON.stringify(d.debug.sample||d.debug.errors||'').slice(0,300)+'<\u002Fsmall>' : '') + '<\u002Fdiv>';\n        btn.textContent = '📧 שלח יומן למייל';\n      }\n      btn.disabled = false;\n    })\n    .catch(function() {\n      status.innerHTML = '<div style=\"font-size:12px;color:#c62828;padding:8px;background:#fce4ec;border-radius:8px;\">⚠️ שגיאת חיבור<\u002Fdiv>';\n      btn.textContent = '📧 שלח יומן למייל'; btn.disabled = false;\n    });\n}\n\n\n// ── Per-Project AI Tips ──────────────────────────────\nvar _projectTipsCache = {}; // jobKey → parsed tips array\n\nfunction _closeProjectAI() { document.getElementById(\"projectAIOverlay\").style.display=\"none\"; }\n\nfunction _refreshProjectAI(i) {\n  var p = projects[i]; if (!p) return;\n  var jobKey = 'proj_' + (p.jobId || (p.client||'') + '_' + (p.title||p.name||''));\n  delete _projectTipsCache[jobKey];\n  openProjectAI(i);\n}\n\nfunction openProjectAI(i) {\n  var p = projects[i];\n  if (!p) return;\n  var overlay = document.getElementById('projectAIOverlay');\n  var header  = document.getElementById('projectAIHeader');\n  var body    = document.getElementById('projectAIBody');\n  overlay.style.display = 'flex';\n\n  var cc = clientColor(p.client||'');\n  header.innerHTML =\n    '<span style=\"font-size:18px;\">💫<\u002Fspan>' +\n    '<div style=\"flex:1;\"><div style=\"font-size:14px;font-weight:900;color:#fff;\">' + (p.title||p.name||'') + '<\u002Fdiv>' +\n    '<div style=\"font-size:10px;color:rgba(255,255,255,0.7);\">' + (p.client||'') + (p.category ? ' · ' + p.category : '') + '<\u002Fdiv><\u002Fdiv>' +\n    '<button onclick=\"_closeProjectAI()\" style=\"background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;\">✕<\u002Fbutton>';\n\n  var jobKey = 'proj_' + (p.jobId || (p.client||'') + '_' + (p.title||p.name||''));\n  var doneTipsList = getDoneTips(jobKey);\n\n  var catCfg = {\n    'חיזוק':       { icon:'💪', grad:'linear-gradient(135deg,#1b5e20,#388e3c)', light:'#e8f5e9', accent:'#2e7d32', sub:'חיזוק חיובי' },\n    'לשיפור':      { icon:'🔧', grad:'linear-gradient(135deg,#e65100,#f57c00)', light:'#fff3e0', accent:'#e65100', sub:'הצעה לשיפור' },\n    'טיפ טכני':   { icon:'🔩', grad:'linear-gradient(135deg,#1F3A52,#2D5F86)', light:'#e3f2fd', accent:'#1F3A52', sub:'הדרכה טכנית' },\n    'תנאי עבודה': { icon:'🌤️', grad:'linear-gradient(135deg,#f57f17,#fbc02d)', light:'#fffde7', accent:'#f57f17', sub:'בטיחות ותנאים' }\n  };\n\n  function buildShell(loading) {\n    return '<div style=\"display:flex;flex-direction:column;gap:9px;padding:4px 0;\">' +\n      ['חיזוק','לשיפור','טיפ טכני','תנאי עבודה'].map(function(cat) {\n        var cfg = catCfg[cat];\n        return '<div style=\"background:' + cfg.light + ';border-radius:13px;overflow:hidden;\">' +\n          '<div style=\"background:' + cfg.grad + ';padding:9px 13px;display:flex;align-items:center;gap:8px;\">' +\n            '<span style=\"font-size:16px;\">' + cfg.icon + '<\u002Fspan>' +\n            '<div style=\"flex:1;\">' +\n              '<div style=\"font-size:13px;font-weight:900;color:#fff;\">' + cat + '<\u002Fdiv>' +\n              '<div style=\"font-size:10px;color:rgba(255,255,255,0.75);\">' + cfg.sub + '<\u002Fdiv>' +\n            '<\u002Fdiv>' +\n          '<\u002Fdiv>' +\n          '<div id=\"aiCat_' + cat.replace(/\\s/g,'_') + '\" style=\"padding:11px 13px;\">' +\n            (loading ?\n              '<div style=\"width:50%;height:8px;background:rgba(0,0,0,0.08);border-radius:4px;margin-bottom:5px;\"><\u002Fdiv>' +\n              '<div style=\"width:80%;height:8px;background:rgba(0,0,0,0.06);border-radius:4px;margin-bottom:5px;\"><\u002Fdiv>' +\n              '<div style=\"width:65%;height:8px;background:rgba(0,0,0,0.06);border-radius:4px;\"><\u002Fdiv>'\n            : '') +\n          '<\u002Fdiv>' +\n        '<\u002Fdiv>';\n      }).join('') +\n      '<button onclick=\"_refreshProjectAI('+i+')\" style=\"width:100%;padding:9px;background:#f0f0f0;border:none;border-radius:8px;font-size:12px;font-weight:700;color:#333;cursor:pointer;font-family:Heebo,sans-serif;margin-top:4px;\">🔄 רענן<\u002Fbutton>' +\n    '<\u002Fdiv>';\n  }\n\n  function renderTips(tips) {\n    tips.forEach(function(t) {\n      var catId = (t.cat||'').replace(/\\s/g,'_');\n      var el = document.getElementById('aiCat_' + catId);\n      if (!el) return;\n      var cfg = catCfg[t.cat] || { accent:'#333' };\n      var isDone = doneTipsList.indexOf(t.body||'') !== -1;\n      var safeTipBody = (t.body||'').replace(/'/g,\"\\\\'\").replace(/\\n/g,' ');\n      var safeJobKey  = jobKey.replace(/'/g,\"\\\\'\");\n      el.innerHTML =\n        '<div onclick=\"_tipClick(this,\\'' + safeJobKey + '\\',\\'' + safeTipBody + '\\')\" style=\"cursor:pointer;-webkit-tap-highlight-color:transparent;\">' +\n          '<div data-tip-title style=\"font-size:12px;font-weight:900;color:' + (isDone?'#bbb':cfg.accent) + ';margin-bottom:4px;' + (isDone?'text-decoration:line-through;':'') + '\">' + (t.title||'') + '<\u002Fdiv>' +\n          '<div data-tip-body style=\"font-size:13px;color:' + (isDone?'#bbb':'#333') + ';line-height:1.55;direction:rtl;' + (isDone?'text-decoration:line-through;':'') + '\">' + (t.body||'').replace(/\\n/g,'<br>') + '<\u002Fdiv>' +\n          '<div data-done-lbl style=\"font-size:10px;color:#2e7d32;margin-top:4px;display:' + (isDone?'block':'none') + ';\">✓ בוצע<\u002Fdiv>' +\n        '<\u002Fdiv>';\n    });\n  }\n\n  // ── Use cache if available ────────────────────────────\n  if (_projectTipsCache[jobKey]) {\n    body.innerHTML = buildShell(false);\n    renderTips(_projectTipsCache[jobKey]);\n    return;\n  }\n\n  // ── Show loading skeletons ────────────────────────────\n  body.innerHTML = buildShell(true);\n\n  var now = Date.now();\n  var todayMs = (p.totalMs||0) + (p.active && p.activeStart ? (now - p.activeStart) : 0);\n  var totalMs = todayMs + (parseFloat(p.hoursActual||0) * 3600000);\n  // Truncate notes to last 5 to avoid URL length limits\n  var recentNotes = (p.notes||[]).slice(-5);\n  var cleanNotes = recentNotes.join(' | ')\n    .replace(/\\(\\d{1,2}:\\d{2}[^)]*\\)/g,'')\n    .replace(/\\d+:\\d{2}:\\d{2}/g,'')\n    .replace(/\\s+/g,' ').trim()\n    .slice(0, 300); // hard cap 300 chars\n\n  var preSurveys = JSON.parse(localStorage.getItem('preProjectSurveys')||'[]');\n  var jobSurvey = preSurveys.filter(function(s){ return s.jobId === (p.jobId||'') || s.desc === (p.title||p.name||''); }).pop() || {};\n\n  var params = '?action=getProjectTips' +\n    '&desc='      + encodeURIComponent((p.title||p.name||'').slice(0,120)) +\n    '&cat='       + encodeURIComponent(p.category||'') +\n    '&client='    + encodeURIComponent((p.client||'').slice(0,60)) +\n    '&notes='     + encodeURIComponent(cleanNotes.slice(0,200)) +\n    '&actualHrs=' + Math.round(totalMs/3600000*100)/100 +\n    '&estHrs='    + (p.estHours||0) +\n    '&income='    + (p.jobIncome||p.jobPrice||0) +\n    '&materials=' + encodeURIComponent(JSON.stringify((jobSurvey.materials||[]).slice(0,3).map(function(m){return String(m).slice(0,80);}))) +\n    '&steps='     + encodeURIComponent(JSON.stringify((jobSurvey.steps||[]).slice(0,5).map(function(s){return String(s).slice(0,80);}))) +\n    '&done='      + encodeURIComponent(JSON.stringify(doneTipsList.slice(0,5).map(function(d){return {cat:d.cat,body:(d.body||'').slice(0,60)};})));\n\n  var _timer = setTimeout(function(){\n    ['חיזוק','לשיפור','טיפ_טכני','תנאי_עבודה'].forEach(function(c){\n      var el = document.getElementById('aiCat_'+c);\n      if (el) el.innerHTML = '<div style=\"font-size:12px;color:#888;padding:4px 0;\">⏱ timeout<\u002Fdiv>';\n    });\n  }, 18000);\n\n  fetch(SHEETS_URL + params)\n    .then(function(r){ return r.text(); })\n    .then(function(txt) {\n      clearTimeout(_timer);\n      var result;\n      try { result = JSON.parse(txt); } catch(pe) {\n        body.innerHTML = '<div style=\"padding:12px;color:#c62828;font-size:12px;background:#fce4ec;border-radius:10px;direction:rtl;\">⚠️ Parse error:<br>' + txt.slice(0,300) + '<\u002Fdiv>';\n        return;\n      }\n      var parsed = result.parsed;\n      if (!parsed || !parsed.tips || !parsed.tips.length) {\n        var errMsg = result.error || result.text || 'No tips returned';\n        body.innerHTML = '<div style=\"padding:16px;color:#c62828;font-size:13px;direction:rtl;background:#fce4ec;border-radius:10px;margin-bottom:10px;\">⚠️ ' + errMsg.slice(0,200) + '<\u002Fdiv>' +\n          '<button onclick=\"_refreshProjectAI('+i+')\" style=\"width:100%;padding:9px;background:#f0f0f0;border:none;border-radius:8px;font-size:12px;font-weight:700;color:#333;cursor:pointer;font-family:Heebo,sans-serif;\">🔄 נסה שוב<\u002Fbutton>';\n        return;\n      }\n      _projectTipsCache[jobKey] = parsed.tips;\n      renderTips(parsed.tips);\n    })\n    .catch(function(err) {\n      clearTimeout(_timer);\n      body.innerHTML = '<div style=\"padding:16px;color:#e53935;text-align:center;\">⚠️ ' + (err.message||'error') + '<\u002Fdiv>';\n    });\n}\n\n// ── Done Tips ─────────────────────────────────────────\nfunction getDoneTips(jobKey) {\n  var all = JSON.parse(localStorage.getItem('doneTips')||'{}');\n  return all[jobKey] || [];\n}\nfunction toggleDoneTip(jobKey, tipBody, el) {\n  var all = JSON.parse(localStorage.getItem('doneTips')||'{}');\n  if (!all[jobKey]) all[jobKey] = [];\n  var idx = all[jobKey].indexOf(tipBody);\n  if (idx === -1) {\n    all[jobKey].push(tipBody);\n    el.style.opacity = '0.55';\n    el.style.borderRightColor = '#ccc';\n    el.querySelectorAll('[data-tip-title],[data-tip-body]').forEach(function(e){ e.style.textDecoration='line-through'; e.style.color='#aaa'; });\n    var lbl = el.querySelector('[data-done-lbl]');\n    if (lbl) lbl.style.display='block';\n  } else {\n    all[jobKey].splice(idx,1);\n    el.style.opacity='1';\n    el.style.borderRightColor='';\n    el.querySelectorAll('[data-tip-title],[data-tip-body]').forEach(function(e){ e.style.textDecoration=''; e.style.color=''; });\n    var lbl = el.querySelector('[data-done-lbl]');\n    if (lbl) lbl.style.display='none';\n  }\n  localStorage.setItem('doneTips', JSON.stringify(all));\n}\n\nfunction _tipClick(el, jobKey, tipBody) {\n  toggleDoneTip(jobKey, tipBody, el);\n}\n\n// ── end Done Tips ──────────────────────────────────────\n\n// ── end Per-Project AI Tips ────────────────────────────\n\n\n// ── Auth ─────────────────────────────────────────────\nvar SESSION_KEY = 'yb_session';\n\nfunction _checkAuth() {\n  var loginEl = document.getElementById('loginScreen');\n  if (!loginEl) {\n    // DOM not ready yet — wait for DOMContentLoaded\n    return false;\n  }\n  var session = null;\n  try { session = JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e) {}\n  if (session && session.token && session.expires && Date.now() < session.expires) {\n    loginEl.style.display = 'none';\n    return true;\n  }\n  // No valid session — show login\n  loginEl.style.display = 'flex';\n  document.querySelectorAll('.screen').forEach(function(s){ s.style.visibility = 'hidden'; });\n  return false;\n}\n\nfunction submitLogin() {\n  var email = (document.getElementById('loginEmail').value||'').trim().toLowerCase();\n  var pass  = (document.getElementById('loginPassword').value||'');\n  var errEl = document.getElementById('loginError');\n  var btn   = document.getElementById('loginBtn');\n\n  if (!email || !pass) { errEl.textContent='Please enter email and password'; errEl.style.display='block'; return; }\n  errEl.style.display = 'none';\n  btn.textContent = 'Signing in…'; btn.disabled = true;\n\n  var rememberMe = (document.getElementById('rememberMe')||{}).checked;\n  fetch(SHEETS_URL + '?action=adminLogin&email=' + encodeURIComponent(email) + '&pass=' + encodeURIComponent(pass) + '&remember=' + (rememberMe?'1':'0'))\n    .then(function(r){ return r.json(); })\n    .then(function(result) {\n      btn.textContent = 'Sign In'; btn.disabled = false;\n      if (result.ok && result.token) {\n        var expiryDays = result.remember === '1' ? 90 : 30;\n        localStorage.setItem(SESSION_KEY, JSON.stringify({ token: result.token, expires: Date.now() + expiryDays*24*60*60*1000, email: email, remember: result.remember }));\n        document.getElementById('loginScreen').style.display = 'none';\n        document.querySelectorAll('.screen').forEach(function(s){ s.style.visibility = ''; });\n        location.reload();\n      } else {\n        errEl.textContent = result.error || 'Invalid email or password';\n        errEl.style.display = 'block';\n      }\n    })\n    .catch(function(err) {\n      btn.textContent = 'Sign In'; btn.disabled = false;\n      errEl.textContent = 'Connection error — try again';\n      errEl.style.display = 'block';\n    });\n}\n\nfunction logout() {\n  localStorage.removeItem(SESSION_KEY);\n  location.reload();\n}\n// ── end Auth ──────────────────────────────────────\n\ndocument.addEventListener('DOMContentLoaded', function() { init(); });\n\n// ── end Post-Project Survey ───────────────────────────\n\n// ── end My Toolbox ─────────────────────────────────────\n\n// ── end AI Session Tips ───────────────────────────────\n\n// ── end AI Daily Briefing ─────────────────────────────\n\n// ── end AI Advisor ─────────────────────────────────────────\n\n// ── Pre-Project Timer ─────────────────────────────────\nvar _preTimer = (function() {\n  try { return JSON.parse(localStorage.getItem('yb_preTimer') || 'null'); } catch(e) { return null; }\n})() || { jobId: null, client: null, desc: null, ms: 0, start: null, active: false };\n\nfunction _savePreTimer() { try { localStorage.setItem('yb_preTimer', JSON.stringify(_preTimer)); } catch(e) {} }\n\nfunction _preTimerMs() {\n  var t = _preTimer.ms;\n  if (_preTimer.active && _preTimer.start) t += Date.now() - _preTimer.start;\n  return t;\n}\n\nfunction _formatPreTimer(ms) {\n  var s = Math.floor(ms / 1000);\n  var h = Math.floor(s / 3600); s -= h * 3600;\n  var m = Math.floor(s / 60); s -= m * 60;\n  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');\n}\n\nfunction _updatePreTimerUI() {\n  var ms = _preTimerMs();\n  var disp = _formatPreTimer(ms);\n  var el = document.getElementById('preTimerDisplay');\n  if (el) el.textContent = disp;\n  var st = document.getElementById('preTimerStatus');\n  if (st) st.textContent = _preTimer.active ? 'running' : 'paused';\n  var btn = document.getElementById('preTimerToggleBtn');\n  if (btn) { btn.textContent = _preTimer.active ? '⏸ Pause' : '▶ Start'; btn.style.background = _preTimer.active ? '#c62828' : '#00695c'; }\n  var lbl = document.getElementById('preTimerJobLabel');\n  if (lbl) lbl.textContent = _preTimer.jobId ? _preTimer.jobId + ' — ' + (_preTimer.desc || '') + ' (' + (_preTimer.client || '') + ')' : '';\n  var dot = document.getElementById('preTimerDayDot');\n  if (dot) dot.style.display = _preTimer.active ? 'inline-block' : 'none';\n  var dayRow = document.getElementById('preTimerDayRow');\n  if (dayRow) dayRow.style.display = _preTimer.jobId ? 'flex' : 'none';\n  var dayTime = document.getElementById('preTimerDayTime');\n  if (dayTime) dayTime.textContent = disp;\n  var dayName = document.getElementById('preTimerDayName');\n
