<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#e0e0e0;display:flex;justify-content:center;padding:16px;}
.phone{width:390px;min-height:844px;background:#fff;border-radius:32px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.2);display:flex;flex-direction:column;}
.date-bar{padding:10px 18px 8px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;justify-content:space-between;direction:ltr;}
.label{font-size:28px;font-weight:900;color:#aaa;text-transform:uppercase;letter-spacing:3px;text-align:center;padding:14px 18px 10px;}
.lines-area{flex:1;display:flex;align-items:center;justify-content:center;}
.lines{display:flex;flex-direction:column;gap:20px;align-items:center;}
.line{width:200px;height:14px;background:#bbb;border-radius:7px;}
.btn-wrap{padding:12px 16px 32px;}
.btn{width:100%;padding:32px 20px;background:#f0c020;color:#111;border:none;border-radius:16px;font-size:26px;font-weight:900;opacity:0.25;}
</style>
</head>
<body>
<div class="phone">
  <div class="date-bar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="color:#aaa;font-size:16px;">ℹ</span>
      <span style="font-size:18px;font-weight:900;color:#111;">Tuesday</span>
      <span style="font-size:14px;color:#888;font-weight:500;">5/5/2026</span>
    </div>
    <span style="font-size:22px;font-weight:900;color:#111;">20:03:14</span>
  </div>
  <div class="label">TODAY'S PROJECTS</div>
  <div class="lines-area">
    <div class="lines">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </div>
  </div>
  <div class="btn-wrap">
    <button class="btn">← Start Work Session</button>
  </div>
</div>
</body></html>
